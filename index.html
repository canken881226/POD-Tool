        : prompt + ', isolated on pure white background, flat vector illustration, print-ready, no background, centered composition';
      const resp = await fetch(workerUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-action': 'ideogram-generate',
          'x-ideogram-key': key
        },
        body: JSON.stringify({
          image_request: {
            prompt: fullPrompt,
            model: modelVer||'V_3',
            aspect_ratio: ar,
            style_type: 'DESIGN',
            magic_prompt_option: 'OFF',
            rendering_speed: modelVer==='V_2_TURBO'?'TURBO':'QUALITY',
            num_images: 2
          }
        })
      });
      if(!resp.ok) {
        const e = await resp.json().catch(function(){return {};});
        throw new Error((e.error&&e.error.message)||e.message||'HTTP '+resp.status);
      }
      const data = await resp.json();
      if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
      return (data.data||[]).map(function(d){return d.url;});
    }

    // 通过Worker下载图片为base64(解决跨域)
    async function fetchImgViaWorker(imgUrl) {
      const workerUrl = localStorage.getItem('pod_worker_url')||'';
      if(!workerUrl) throw new Error('无Worker URL');
      const resp = await fetch(workerUrl, {
        method: 'POST',
        headers: {'Content-Type':'application/json','x-action':'fetch-image'},
        body: JSON.stringify({url: imgUrl})
      });
      if(!resp.ok) throw new Error('Worker图片下载失败 '+resp.status);
      const d = await resp.json();
      if(d.error) throw new Error(d.error.message||'图片下载失败');
      return d.b64; // base64 string
    }

    async function scoreImageWithClaude(imgUrl, promptContext) {
      const apiKey = getApiKey();
      if(!apiKey) return {score:50, reason:'无Claude Key', verdict:'备选'};
      try {
        const b64 = await fetchImgViaWorker(imgUrl);
        // 直接调Claude API，不用callClaudeWithImage(避免格式问题)
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 200,
            system: 'POD图案评审专家。只输出JSON，不含其他内容。',
            messages: [{
              role: 'user',
              content: [
                {type:'image', source:{type:'base64', media_type:'image/png', data:b64}},
                {type:'text', text:
                  '评估这张图案的POD印刷适配性。\n'
                  +'评分标准(满分100)：颜色简洁≤4色25分、背景纯白20分、边缘清晰25分、构图居中15分、视觉冲击力15分。\n'
                  +'图案主题：'+promptContext+'\n'
                  +'输出JSON：{"score":85,"reason":"简短理由15字内","colors":"颜色数","verdict":"推荐/备选/不推荐"}'
                }
              ]
            }]
          })
        });
        const d = await resp.json();
        const text = (d.content&&d.content[0]&&d.content[0].text)||'';
        const match = text.match(/\{[\s\S]*?\}/);
        if(match) return JSON.parse(match[0]);
        return {score:50, reason:'解析失败', verdict:'备选'};
      } catch(e) {
        return {score:50, reason:'评分出错:'+e.message.slice(0,20), verdict:'备选'};
      }
    }


    // ── 图案侵权扫描（生图后调用）────────────────────────
    async function scanImageForCopyright(imgUrl, context) {
      const apiKey = getApiKey();
      if(!apiKey) return {status:'pass', alerts:[], note:'无API Key，跳过扫描'};
      try {
        const b64 = await fetchImgViaWorker(imgUrl);
        const cpBans = getCpBanList();
        const banList = cpBans.banned.slice(0,30).join(', ');
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'x-api-key':apiKey,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true'
          },
          body: JSON.stringify({
            model:'claude-haiku-4-5-20251001',
            max_tokens:300,
            system:'POD版权风险专家。只输出JSON。',
            messages:[{role:'user',content:[
              {type:'image',source:{type:'base64',media_type:'image/png',data:b64}},
              {type:'text',text:
                '检查此图案是否存在版权/商标侵权风险。\n'
                +'禁用元素列表：'+banList+'\n'
                +'图案背景：'+context+'\n\n'
                +'检查：1)是否包含已知IP/角色 2)是否有品牌logo/文字 3)是否模仿知名设计风格\n'
                +'输出JSON：{"status":"pass/warning/danger","alerts":["风险描述1"],"note":"总结一句话","safe_to_use":true}'
              }
            ]}]
          })
        });
        const d = await resp.json();
        const text = (d.content&&d.content[0]&&d.content[0].text)||'';
        const match = text.match(/\{[\s\S]*?\}/);
        if(match) return JSON.parse(match[0]);
        return {status:'pass',alerts:[],note:'扫描完成',safe_to_use:true};
      } catch(e) {
        return {status:'pass',alerts:[],note:'扫描出错:'+e.message.slice(0,20),safe_to_use:true};
      }
    }

    // ── WFStep3b: Ideogram生图 + Claude评分筛选 ──────────────────────
    function WFStep3b({data,upd,cat,colors,onNext,onBack}) {
      // Key/Worker 统一在生图工坊设置，这里只读取
      const [genState, setGenState] = React.useState(data.ideogramResults||{});
      const [loading, setLoading] = React.useState(false);
      const [currentCombo, setCurrentCombo] = React.useState('');
      const [approvedImages, setApprovedImages] = React.useState(data.approvedImages||[]);
      // approvedImages: [{url, comboName, label, score}] - 确认要上架的图
      const [selectedModel, setSelectedModel] = React.useState(localStorage.getItem('ideogram_model')||'V_3');
      const [customPrompt, setCustomPrompt] = React.useState('');
      const [customAspect, setCustomAspect] = React.useState('1x1');
      const [customSeamless, setCustomSeamless] = React.useState(false);
      const [customResults, setCustomResults] = React.useState(data.customGenResults||[]);
      const [customLoading, setCustomLoading] = React.useState(false);
      const combos = data.selectedCombos||[];
      const prompts = data.mjPrompts||{};

      const MODELS = [
        {value:'V_3', label:'V3(最新·最强)', desc:'细节最好，适合复杂图案'},
        {value:'V_2', label:'V2(文字排版强)', desc:'文字+徽章类首选'},
        {value:'V_2_TURBO', label:'V2 Turbo(快·省钱)', desc:'快速出图，费用减半'},
      ];



      // Detect if prompt is text-heavy (for DESIGN style) or illustration (ILLUSTRATION style)
      function isTextHeavy(prompt) {
        const textMarkers = ['typography','text','lettering','badge','slogan','made','born','proud','style'];
        const p = prompt.toLowerCase();
        return textMarkers.some(function(m){return p.indexOf(m)>=0;});
      }

      // 清理MJ咒语为Ideogram可用的纯文本提示词
      function cleanPrompt(p) {
        return p.replace('/imagine prompt:','')
          .replace(/--ar\s+\S+/g,'').replace(/--s\s+\d+/g,'')
          .replace(/--v\s+\S+/g,'').replace(/--tile/g,'')
          .replace(/--no\s+[^-]+/g,'').trim();
      }

      // Claude选出最优咒语(从候选列表里选1条)
      async function pickBestPrompt(candidates, context) {
        if(candidates.length===1) return candidates[0];
        try {
          const pickPrompt =
            '你是POD图案设计专家。从以下Midjourney咒语中选出最适合Ideogram生成POD印刷图案的1条。\n'
            +'选择标准：主体明确、构图清晰、适合印刷、无版权风险。\n'
            +'图案主题：'+context+'\n\n'
            +'候选咒语：\n'
            +candidates.map(function(p,i){return (i+1)+'. '+p;}).join('\n')
            +'\n\n只输出数字(1到'+candidates.length+')，不含其他内容。';
          const raw = await callClaudeAPI(pickPrompt, 'POD expert. Output number only.');
          const num = parseInt(raw.trim());
          if(num>=1&&num<=candidates.length) return candidates[num-1];
        } catch(e) {}
        return candidates[0];
      }

      async function runAll() {
        if(!getIdeogramKey()){alert('请先设置 Ideogram API Key');return;}
        if(!getPodWorkerUrl()){alert('请先设置 Worker URL');return;}
        if(!combos.length){alert('没有找到图案方案，请返回上一步');return;}
        setLoading(true);
        const isHome = cat==='家居';
        const results = {...genState};

        for(let ci=0; ci<combos.length; ci++){
          const combo = combos[ci];
          const name = combo.name;
          const comboPrompts = (prompts[name]||[]).map(cleanPrompt).filter(function(p){return p.length>10;});
          const context = combo.nameCN||name;

          if(!comboPrompts.length){
            results[name]={status:'error',urls:[],scores:[],picks:{},groups:[],error:'无可用提示词，请返回上一步重新生成'};
            setGenState({...results});
            continue;
          }

          setCurrentCombo(context);
          results[name]={status:'generating',urls:[],scores:[],picks:{},groups:[]};
          setGenState({...results});

          try {
            var allUrls=[], allScores=[], groups=[];

            if(isHome) {
              // 家居：全部咒语里Claude选2条，各生2张，共4张
              const cand1 = comboPrompts.slice(0, Math.ceil(comboPrompts.length/2));
              const cand2 = comboPrompts.slice(Math.ceil(comboPrompts.length/2));
              const p1 = await pickBestPrompt(cand1.length?cand1:comboPrompts, context+'(主图)');
              const p2 = await pickBestPrompt(cand2.length&&cand2[0]!==p1?cand2:comboPrompts.filter(function(p){return p!==p1;}), context+'(变体)');
              results[name]={...results[name],status:'generating'};setGenState({...results});

              const urls1 = await ideogramGenerate(p1, false, '1x1', selectedModel);
              allUrls = allUrls.concat(urls1.slice(0,2));
              groups.push({label:'方案A',start:0,end:2});

              const urls2 = await ideogramGenerate(p2, false, '1x1', selectedModel);
              allUrls = allUrls.concat(urls2.slice(0,2));
              groups.push({label:'方案B',start:2,end:4});

            } else {
              // 服装：无缝图(0-4)选1条，单主体(5-9)选1条，各生2张
              const seamlessPrompts = comboPrompts.filter(function(p,i){return i<5;});
              const singlePrompts = comboPrompts.filter(function(p,i){return i>=5;});

              const seamlessBest = seamlessPrompts.length
                ? await pickBestPrompt(seamlessPrompts, context+'(无缝图)')
                : null;
              const singleBest = singlePrompts.length
                ? await pickBestPrompt(singlePrompts, context+'(单主体)')
                : await pickBestPrompt(comboPrompts, context);

              if(seamlessBest) {
                const urls1 = await ideogramGenerate(seamlessBest, true, '1x1', selectedModel);
                allUrls = allUrls.concat(urls1.slice(0,2));
                groups.push({label:'🔲 无缝图',start:0,end:2});
              }
              const urls2 = await ideogramGenerate(singleBest, false, '1x1', selectedModel);
              const start = allUrls.length;
              allUrls = allUrls.concat(urls2.slice(0,2));
              groups.push({label:'🖼️ 单主体',start:start,end:start+2});
            }

            results[name]={...results[name],status:'scoring',urls:allUrls,groups:groups};
            setGenState({...results});

            // 评分(逐张评分，间隔800ms避免429)
            for(let ui=0;ui<allUrls.length;ui++){
              if(ui>0) await new Promise(function(r){setTimeout(r,800);});
              const sc = await scoreImageWithClaude(allUrls[ui], context);
              allScores.push(sc);
              results[name]={...results[name],scores:[...allScores]};
              setGenState({...results});
            }

            // 每个group里选最高分
            const picks = {};
            groups.forEach(function(g){
              const groupScores = allScores.slice(g.start,g.end).map(function(s,i){return {idx:g.start+i,score:s.score||0};});
              groupScores.sort(function(a,b){return b.score-a.score;});
              picks[g.label] = groupScores[0]?groupScores[0].idx:g.start;
            });

            results[name]={status:'done',urls:allUrls,scores:allScores,picks:picks,groups:groups};
            setGenState({...results});
            upd('ideogramResults', results);

          } catch(e) {
            results[name]={status:'error',urls:[],scores:[],picks:{},groups:[],error:e.message};
            setGenState({...results});
          }

          if(ci < combos.length-1) await new Promise(function(r){setTimeout(r,3000);});
        }

        setLoading(false);
        setCurrentCombo('');
        upd('ideogramResults', results);
      }

      // 切换图片的"确认上架"状态
      function toggleApprove(url, comboName, label, score) {
        setApprovedImages(function(prev){
          const exists = prev.find(function(x){return x.url===url;});
          const updated = exists
            ? prev.filter(function(x){return x.url!==url;})
            : [...prev,{url,comboName,label,score:score||0}];
          upd('approvedImages', updated);
          return updated;
        });
      }

      const allDone = combos.length>0 && combos.every(function(c){
        const r=genState[c.name]; return r&&(r.status==='done'||r.status==='error');
      });

      async function downloadImage(url, filename) {
        try {
          const b64 = await fetchImgViaWorker(url);
          const byteChars = atob(b64);
          const byteArr = new Uint8Array(byteChars.length);
          for(let i=0;i<byteChars.length;i++) byteArr[i]=byteChars.charCodeAt(i);
          const blob = new Blob([byteArr], {type:'image/png'});
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
        } catch(e) { alert('下载失败，请右键图片另存为'); }
      }

      return <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div style={{fontWeight:800,fontSize:18,color:colors.ac}}>Step 5 — AI生图 & 自动筛选</div>

        {/* Key设置 - 跳转到生图工坊设置 */}
        {(!getIdeogramKey()||!getPodWorkerUrl()) ? (
          <div style={{padding:'12px 16px',background:'#fef9c3',borderRadius:10,border:'2px solid #fde047'}}>
            <div style={{fontSize:13,color:'#92400e',fontWeight:700,marginBottom:4}}>⚠️ 请先完成API设置</div>
            <div style={{fontSize:12,color:'#92400e',marginBottom:10}}>Ideogram Key 和 Worker URL 需要在「生图工坊」页面设置，设置一次全局生效。</div>
            <IdeogramKeyInput colors={colors} />
            <div style={{marginTop:8}}><WorkerUrlInput colors={colors} /></div>
          </div>
        ) : (
          <div style={{padding:'10px 14px',background:'#f0fdf4',borderRadius:10,border:'1px solid #bbf7d0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:12,color:'#15803d',fontWeight:600}}>✅ API已设置 · Ideogram V3 · 每方案生成4张 · Claude自动评分</span>
            <span style={{fontSize:11,color:'#94a3b8'}}>在生图工坊修改</span>
          </div>
        )}

        {/* 模型选择 */}
        <div style={{background:'#f8fafc',borderRadius:10,padding:14,border:'1px solid #e2e8f0'}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:'#374151'}}>⚙️ 生图模型</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {MODELS.map(function(m){
              const active = selectedModel===m.value;
              return <div key={m.value} onClick={function(){setSelectedModel(m.value);localStorage.setItem('ideogram_model',m.value);}}
                style={{flex:1,minWidth:140,padding:'10px 12px',borderRadius:8,cursor:'pointer',
                  border:'2px solid '+(active?colors.ac:'#e2e8f0'),
                  background:active?colors.ac+'10':'white'}}>
                <div style={{fontWeight:700,fontSize:12,color:active?colors.ac:'#374151'}}>{m.label}</div>
                <div style={{fontSize:10,color:'#94a3b8',marginTop:2}}>{m.desc}</div>
              </div>;
            })}
          </div>
        </div>

        {/* 自定义咒语生图 */}
        <div style={{background:'#fffbeb',borderRadius:10,padding:14,border:'2px solid #fde047'}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:'#92400e'}}>✏️ 自定义咒语生图</div>
          <textarea value={customPrompt} onChange={function(e){setCustomPrompt(e.target.value);}}
            placeholder="直接输入 Ideogram 提示词，例如：Mexican eagle badge, bold black red gold, flat vector, white background, print-ready..."
            style={{width:'100%',minHeight:72,padding:'8px 12px',borderRadius:8,border:'1px solid #fde047',
              fontSize:12,outline:'none',resize:'vertical',boxSizing:'border-box',marginBottom:10}} />
          <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <span style={{fontSize:12,color:'#374151',fontWeight:600}}>比例：</span>
              {['1x1','3x4','4x3','9x16','16x9'].map(function(ar){
                return <button key={ar} onClick={function(){setCustomAspect(ar);}}
                  style={{padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:700,cursor:'pointer',
                    background:customAspect===ar?colors.ac:'#f1f5f9',
                    color:customAspect===ar?'white':'#475569',border:'none'}}>
                  {ar}
                </button>;
              })}
            </div>
            <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:12,color:'#374151'}}>
              <input type="checkbox" checked={customSeamless} onChange={function(e){setCustomSeamless(e.target.checked);}}
                style={{width:14,height:14}} />
              无缝图模式
            </label>
          </div>
          <button onClick={async function(){
            if(!customPrompt.trim()){alert('请输入提示词');return;}
            if(!getIdeogramKey()||!getPodWorkerUrl()){alert('请先设置API Key和Worker URL');return;}
            setCustomLoading(true);
            setCustomResults([]);
            try {
              const urls = await ideogramGenerate(customPrompt.trim(), customSeamless, customAspect, selectedModel);
              setCustomResults(urls);
              upd('customGenResults', urls);
              upd('customGenPrompt', customPrompt.trim());
            } catch(e) {
              alert('生图失败：'+e.message);
            }
            setCustomLoading(false);
          }} disabled={customLoading||!customPrompt.trim()}
            style={{width:'100%',padding:'10px',background:customLoading?'#94a3b8':'#f59e0b',
              color:'white',border:'none',borderRadius:8,fontWeight:700,fontSize:13,cursor:customLoading?'not-allowed':'pointer'}}>
            {customLoading?'⏳ 生图中...':'🎨 立即生图'}
          </button>
          {customResults.length>0&&(
            <div style={{marginTop:12}}>
              <div style={{fontSize:11,color:'#92400e',fontWeight:600,marginBottom:8}}>生成结果(点击下载)</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
                {customResults.map(function(url,i){
                  return <div key={i} style={{position:'relative',borderRadius:8,overflow:'hidden',border:'1px solid #e2e8f0',cursor:'pointer'}}
                    onClick={function(){downloadImage(url,'custom_'+selectedModel+'_'+Date.now()+'_'+i+'.png');}}>
                    <img src={url} style={{width:'100%',aspectRatio:'1',objectFit:'cover',display:'block'}} />
                    <div style={{position:'absolute',bottom:0,left:0,right:0,
                      background:'rgba(0,0,0,0.6)',padding:'4px 8px',fontSize:10,color:'white',textAlign:'center'}}>
                      ⬇ 点击下载
                    </div>
                  </div>;
                })}
              </div>
            </div>
          )}
        </div>

        {/* 分割线 */}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1,height:1,background:'#e2e8f0'}}></div>
          <span style={{fontSize:11,color:'#94a3b8',fontWeight:600}}>或使用流程方案自动生图</span>
          <div style={{flex:1,height:1,background:'#e2e8f0'}}></div>
        </div>

        {/* Generate Button */}
        {!allDone && (
          <button onClick={runAll} disabled={loading||!getIdeogramKey()||!getPodWorkerUrl()}
            style={{background:loading?'#94a3b8':colors.ac,color:'white',border:'none',borderRadius:10,
              padding:'14px',fontSize:15,fontWeight:800,cursor:loading?'not-allowed':'pointer'}}>
            {loading
              ? (currentCombo ? '⏳ 正在处理：'+currentCombo+' ...' : '⏳ 处理中...')
              : '🚀 一键生图 + 自动筛选('+combos.length+'个方案)'}
          </button>
        )}

        {/* Results */}
        {combos.map(function(combo){
          const name = combo.name;
          const r = genState[name];
          if(!r) return (
            <div key={name} style={{border:'1px solid #e2e8f0',borderRadius:10,padding:14,color:'#94a3b8',fontSize:13}}>
              <span style={{fontWeight:700,color:'#374151'}}>{combo.nameCN||name}</span> · 等待生成...
            </div>
          );

          const statusMap = {generating:'⏳ 生图中...',scoring:'🔍 Claude评分中...',done:'✅ 完成',error:'❌ 出错'};
          const statusColor = {generating:'#f59e0b',scoring:'#3b82f6',done:'#10b981',error:'#ef4444'};

          return <div key={name} style={{border:'2px solid '+(r.status==='done'?colors.ac+'50':'#e2e8f0'),borderRadius:12,overflow:'hidden'}}>
            {/* Header */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
              padding:'12px 16px',background:r.status==='done'?colors.ac+'15':'#f8fafc'}}>
              <div style={{fontWeight:700,fontSize:15,color:colors.ac}}>{combo.nameCN||name}</div>
              <span style={{fontSize:12,fontWeight:700,color:statusColor[r.status]||'#94a3b8'}}>
                {statusMap[r.status]||'等待中'}
              </span>
            </div>

            {r.status==='error' && (
              <div style={{padding:14,background:'#fef2f2',color:'#dc2626',fontSize:12}}>
                ❌ {r.error||'生成失败'}
              </div>
            )}

            {(r.status==='generating') && (
              <div style={{padding:20,textAlign:'center',color:'#94a3b8',fontSize:13}}>
                ⏳ 正在调用 Ideogram V3 生成4张图片...
              </div>
            )}

            {(r.status==='scoring'||r.status==='done') && r.urls.length>0 && (
              <div style={{padding:14}}>
                {/* 全部图片缩略图 */}
                <div style={{fontSize:11,color:'#64748b',marginBottom:10,fontWeight:600}}>全部生成结果({r.urls.length}张)</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:14}}>
                  {r.urls.map(function(url,i){
                    const sc = r.scores[i];
                    const groups = r.groups||[];
                    const isPick = r.status==='done' && r.picks && Object.values(r.picks).indexOf(i)>=0;
                    const groupOfThis = groups.find(function(g){return i>=g.start&&i<g.end;});
                    const isGroupPick = r.status==='done' && groupOfThis && r.picks[groupOfThis.label]===i;
                    return <div key={i} style={{position:'relative',borderRadius:8,overflow:'hidden',
                      border:'2px solid '+(isGroupPick?'#10b981':isPick?colors.ac:'#e2e8f0')}}>
                      <img src={url} style={{width:'100%',aspectRatio:'1',objectFit:'cover',display:'block'}} />
                      {sc && <div style={{position:'absolute',bottom:0,left:0,right:0,
                        background:'rgba(0,0,0,0.75)',padding:'3px 5px',fontSize:9,color:'white'}}>
                        {sc.score}分 · {sc.reason||''}
                      </div>}
                      {isGroupPick && <div style={{position:'absolute',top:3,right:3,
                        background:'#10b981',color:'white',fontSize:9,fontWeight:700,
                        padding:'2px 5px',borderRadius:3}}>✦ 推荐</div>}
                    </div>;
                  })}
                </div>

                {/* 按group分组展示推荐 */}
                {r.status==='done' && (r.groups||[]).length>0 && (
                  <div style={{display:'flex',flexDirection:'column',gap:12}}>
                    <div style={{fontSize:11,color:'#64748b',fontWeight:600}}>📌 Claude推荐下载</div>
                    {(r.groups||[]).map(function(g){
                      const pickIdx = r.picks[g.label];
                      const url = r.urls[pickIdx];
                      const sc = r.scores[pickIdx];
                      if(!url) return null;
                      return <div key={g.label} style={{border:'2px solid #10b981',borderRadius:10,overflow:'hidden'}}>
                        <div style={{padding:'8px 12px',background:'#f0fdf4',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                          <span style={{fontWeight:700,fontSize:13,color:'#10b981'}}>{g.label}</span>
                          <span style={{fontSize:12,color:'#374151',fontWeight:700}}>{sc&&sc.score?sc.score+'分':''}</span>
                        </div>
                        <div style={{display:'flex',gap:0}}>
                          <img src={url} style={{width:120,height:120,objectFit:'cover',flexShrink:0}} />
                          <div style={{padding:'10px 12px',flex:1,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
                            {sc&&sc.reason&&<div style={{fontSize:11,color:'#64748b'}}>{sc.reason}</div>}
                            {sc&&sc.colors&&<div style={{fontSize:11,color:'#94a3b8'}}>预估颜色：{sc.colors}</div>}
                            <button onClick={function(){downloadImage(url,(combo.nameCN||name)+'_'+g.label.replace(/[🔲🖼️✦\s]/g,'')+'_'+Date.now()+'.png');}}
                              style={{width:'100%',padding:'8px',background:'#10b981',color:'white',
                                border:'none',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer',marginTop:8}}>
                              ⬇ 下载高清图
                            </button>
                          </div>
                        </div>
                      </div>;
                    })}
                  </div>
                )}
              </div>
            )}
          </div>;
        })}

        {/* 推荐图选择上架 */}
        {allDone&&<div style={{background:'#f8fafc',borderRadius:10,padding:14,border:'1px solid #e2e8f0'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#374151',marginBottom:10}}>
            ✅ 选择要上架的图片
            <span style={{fontSize:11,color:'#64748b',fontWeight:400,marginLeft:8}}>侵权扫描在下一步（Listing）进行</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {Object.entries(genState).map(function(entry){
              const name=entry[0]; const r=entry[1];
              if(r.status!=='done'||!r.urls.length) return null;
              const groups=r.groups||[];
              return groups.map(function(g){
                const idx=r.picks&&r.picks[g.label];
                const url=r.urls[idx];
                if(!url) return null;
                const isApproved=approvedImages.some(function(x){return x.url===url;});
                return <div key={g.label+name} style={{display:'flex',gap:10,padding:'10px 12px',borderRadius:8,
                  border:'2px solid '+(isApproved?colors.ac:'#e2e8f0'),
                  background:isApproved?colors.ac+'08':'white',alignItems:'center'}}>
                  <img src={url} style={{width:60,height:60,objectFit:'cover',borderRadius:6,flexShrink:0}} />
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:12,color:'#374151'}}>{name}</div>
                    <div style={{fontSize:11,color:'#94a3b8'}}>{g.label}</div>
                  </div>
                  <button onClick={function(){toggleApprove(url,name,g.label,0);}}
                    style={{padding:'7px 14px',borderRadius:7,border:'2px solid '+(isApproved?colors.ac:'#e2e8f0'),
                      background:isApproved?colors.ac:'white',color:isApproved?'white':'#374151',
                      fontWeight:700,fontSize:12,cursor:'pointer',whiteSpace:'nowrap'}}>
                    {isApproved?'✓ 已选':'选择上架'}
                  </button>
                </div>;
              });
            })}
          </div>
          {approvedImages.length>0&&<div style={{marginTop:10,padding:'8px 12px',background:'#f0fdf4',borderRadius:8,
            border:'1px solid #bbf7d0',fontSize:12,color:'#15803d',fontWeight:600}}>
            已选 {approvedImages.length} 张 → 下一步生成Listing文案
          </div>}
        </div>}

        {/* Navigation */}
        {allDone&&approvedImages.length>0&&(
          <button onClick={onNext}
            style={{background:colors.ac,color:'white',border:'none',borderRadius:10,
              padding:'14px',fontSize:15,fontWeight:800,cursor:'pointer',width:'100%'}}>
            下一步 → 生成Listing文案（{approvedImages.length}张）
          </button>
        )}
        {allDone&&approvedImages.length===0&&(
          <button onClick={onNext}
            style={{background:'#94a3b8',color:'white',border:'none',borderRadius:10,
              padding:'14px',fontSize:14,cursor:'pointer',width:'100%',opacity:0.7}}>
            跳过 → 进入Listing文案（未选择图片）
          </button>
        )}
        {!allDone&&(
          <button onClick={onNext}
            style={{background:'#64748b',color:'white',border:'none',borderRadius:10,
              padding:'12px',fontSize:13,cursor:'pointer',width:'100%',opacity:0.8}}>
            跳过生图 → 直接进入Listing文案
          </button>
        )}
        <button onClick={onBack}
          style={{background:'#f1f5f9',color:'#475569',border:'none',borderRadius:10,
            padding:'12px',fontSize:13,cursor:'pointer',width:'100%'}}>
          ← 上一步(重新生成提示词)
        </button>
      </div>;
    }

    function WFStep4({data,upd,colors,cat,onConfirm,onBack}) {
      const theme = data.theme||{};
      const approvedImages = data.approvedImages||[];
      const lineInfo = data.productLineInfo||{};
      const [listings, setListings] = React.useState(data.wfListings||[]);
      const [loading, setLoading] = React.useState(false);
      const [customNote, setCustomNote] = React.useState(data.listingCustomNote||'');
      const [selCat, setSelCat] = React.useState(data.listingSelCat||'');
      const [uploadedImgs, setUploadedImgs] = React.useState([]);
      // uploadedImgs: [{name, dataUrl}] - 手动上传的图片
      const [cpScanState, setCpScanState] = React.useState({});
      // {imgKey: {status, alerts, note}}
      const [cpScanning, setCpScanning] = React.useState(false);

      const kwDb = (KW_DB[cat])||{};

      function persist(patch){Object.entries(patch).forEach(function(e){data[e[0]]=e[1];});}

      // 处理图片上传
      function handleImgUpload(e) {
        const files = Array.from(e.target.files);
        if(!files.length) return;
        Promise.all(files.map(function(file){
          return new Promise(function(res){
            const reader = new FileReader();
            reader.onload = function(ev){res({name:file.name, dataUrl:ev.target.result});};
            reader.readAsDataURL(file);
          });
        })).then(function(imgs){
          setUploadedImgs(function(prev){return [...prev,...imgs];});
        });
      }

      // 侵权扫描（只扫上传的图）
      async function runCpScan() {
        const allImgs = [
          ...approvedImages.map(function(x){return {key:x.url,src:'url',url:x.url,name:x.comboName||'生成图'};})
          ,...uploadedImgs.map(function(x){return {key:x.name,src:'upload',dataUrl:x.dataUrl,name:x.name};})
        ];
        if(!allImgs.length){alert('没有图片可以扫描');return;}
        setCpScanning(true);
        const newState = {...cpScanState};
        for(let i=0;i<allImgs.length;i++){
          const img=allImgs[i];
          if(newState[img.key]&&newState[img.key].status!=='scanning') continue; // 已扫过跳过
          newState[img.key]={status:'scanning',alerts:[],note:''};
          setCpScanState({...newState});
          try{
            let b64='';
            if(img.src==='url'){b64=await fetchImgViaWorker(img.url);}
            else{b64=img.dataUrl.split(',')[1]||img.dataUrl;}
            const result = await scanImageForCopyright('data:image/png;base64,'+b64, img.name);
            newState[img.key]={...result,name:img.name};
          }catch(e){
            newState[img.key]={status:'pass',alerts:[],note:'扫描出错:'+e.message.slice(0,20),name:img.name};
          }
          setCpScanState({...newState});
          if(i<allImgs.length-1) await new Promise(function(r){setTimeout(r,600);});
        }
        setCpScanning(false);
      }

      async function generateListings() {
        const allSrcImgs = [
          ...approvedImages.map(function(x){return {type:'url',url:x.url,name:x.comboName||'生成图',label:x.label||''};}),
          ...uploadedImgs.map(function(x){return {type:'upload',dataUrl:x.dataUrl,name:x.name,label:'上传图'};})
        ];
        if(!allSrcImgs.length){alert('请先选择图片或上传图片');return;}
        if(!selCat){alert('请先选择子类目');return;}
        setLoading(true);
        const kwCat=(KW_DB[cat]||{})[selCat]||{p:[],s:[]};
        const kwTop=kwCat.p.slice(0,12).join(' ');
        const cpBansL=getCpBanList();
        const banNote=cpBansL.banned.slice(0,20).join(', ');

        // 开发流程上下文
        const devCtx =
          '产品线：'+(lineInfo.line||'')+
          (lineInfo.sub?' / 子分类：'+lineInfo.subs:'')+
          ' | 人群：'+({girl:'女童',boy:'男童',unisex:'通用'}[lineInfo.gender||data.gender||'']||'通用')+
          ' '+(lineInfo.ageGroup||data.ageGroup||'')+'岁'+
          ' | 主题：'+(theme.nameCN||theme.name||'')+
          (theme.type==='combined'?' (常青×节日叠加)':theme.type==='evergreen'?' (常青款)':theme.type==='holiday'?' (节日款)':'')+
          (data.weekTrend?' | 本周趋势情绪：'+(data.weekTrend.emotions||[]).join('、'):'');

        const allListings = [];
        for(let i=0;i<allSrcImgs.length;i++){
          const img = allSrcImgs[i];
          if(i>0) await new Promise(function(r){setTimeout(r,2500);});
          try {
            // Step1: 识图提取元素
            let b64='';
            if(img.type==='url'){b64=await fetchImgViaWorker(img.url);}
            else{b64=(img.dataUrl||'').split(',')[1]||(img.dataUrl||'');}
            const analyzeResp = await fetch('https://api.anthropic.com/v1/messages',{
              method:'POST',
              headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
              body:JSON.stringify({
                model:'claude-haiku-4-5-20251001',
                max_tokens:400,
                system:'POD产品图案分析专家。只输出JSON。',
                messages:[{role:'user',content:[
                  {type:'image',source:{type:'base64',media_type:'image/png',data:b64}},
                  {type:'text',text:'分析此图案，输出JSON：{"elements":["元素1","元素2"],"style":"风格","colors":["颜色1"],"text_on_design":"图案上的文字，无则null","mood":"氛围"}'}
                ]}]
              })
            });
            const ad = await analyzeResp.json();
            const aText = (ad.content&&ad.content[0]&&ad.content[0].text)||'{}';
            let imgAnalysis = {};
            try{const m=aText.match(/\{[\s\S]*\}/);if(m)imgAnalysis=JSON.parse(m[0]);}catch(e){}

            // Step2: 生成Listing
            const listingPrompt =
              'You are a senior Amazon copywriter expert in A9, COSMO, and RUFUS optimization for '+cat+' POD products.\n\n'
              +'DEVELOPMENT CONTEXT:\n'+devCtx+'\n'
              +(customNote?'EXTRA CONTEXT: '+customNote+'\n':'')
              +'\nIMAGE ANALYSIS:\n'
              +'Elements: '+(imgAnalysis.elements||[]).join(', ')+'\n'
              +'Style: '+(imgAnalysis.style||'')+'\n'
              +'Colors: '+(imgAnalysis.colors||[]).join(', ')+'\n'
              +(imgAnalysis.text_on_design?'Text on design: '+imgAnalysis.text_on_design+'\n':'')
              +'Mood: '+(imgAnalysis.mood||'')+'\n'
              +'\nSUBCATEGORY: '+selCat+'\n'
              +'TOP KEYWORDS (Layer 1 core): '+kwTop+'\n'
              +'BANNED WORDS: '+banNote+'\n\n'
              +'=== WRITING RULES (STRICT) ===\n'
              +'TITLE (A9+RUFUS): [Core Keyword] [Key Spec] - for [Main Use Scene], Helps [Core Result], [Bonus]\n'
              +'  - Max 150 chars, Title Case\n'
              +'  - Front: A9 keyword indexing | Back: RUFUS understands product purpose\n'
              +'  - Remove all keywords: must still clearly describe the product\n'
              +'  - Zero duplicate words\n\n'
              +'BULLETS (all 3 engines): [Scene/Condition] + [Problem] → [How product solves] + [Result]\n'
              +'  - Bullet 1: Primary use scene + main benefit\n'
              +'  - Bullet 2: Secondary scene + specific feature\n'
              +'  - Bullet 3: Comparison to basic alternative (Instead of X, this Y)\n'
              +'  - Bullet 4: Address a worry/concern (If you worry about X, this Y)\n'
              +'  - Bullet 5: Best for [ideal user]. Not recommended for [edge case]\n'
              +'  - Each bullet 150-200 chars\n\n'
              +'DESCRIPTION (RUFUS long text): Use HTML tags <p><b><br/>\n'
              +'  - Para 1: Who this is for + what problem it solves\n'
              +'  - Para 2: How it is used in real life\n'
              +'  - Para 3: How it differs from basic alternatives\n'
              +'  - 150-200 words total\n\n'
              +'SEARCH TERMS (A9 only): Layer 3 supplement words not in title/bullets\n'
              +'  - Word roots, phrases, synonyms, alternate spellings\n'
              +'  - No repeats from title\n\n'
              +'Output JSON only:\n'
              +'{"title":"...","color":"(2-3 words describing design pattern)","bullets":["...","...","...","...","..."],"description":"(HTML formatted)","search_terms":"(supplement keywords only)"}';

            const raw = await callClaudeAPI(listingPrompt, 'Amazon listing expert. JSON only.');
            const cleaned = raw.replace(/```json|```/g,'').trim();
            const si=cleaned.indexOf('{'),ei=cleaned.lastIndexOf('}');
            if(si>=0&&ei>=0){
              const parsed = JSON.parse(cleaned.slice(si,ei+1));
              // 过滤标题里的侵权词
              cpBansL.banned.forEach(function(ban){
                if(!ban||!parsed.title) return;
                const re = new RegExp('(?<![a-z0-9])'+ban.replace(/[-.*+?^${}()|[\]\\]/g,'\\$&')+'(?![a-z0-9])','gi');
                parsed.title = parsed.title.replace(re,'').replace(/  +/g,' ').trim();
              });
              parsed.imageUrl = img.type==='url'?img.url:(img.dataUrl||'');
              parsed.imageName = img.name||('图片'+(i+1));
              parsed.imageIdx = i+1;
              parsed.comboName = img.name||'';
              parsed.imgAnalysis = imgAnalysis;
              allListings.push(parsed);
            }
          } catch(e) {
            allListings.push({error:e.message, imageUrl:img.url, imageIdx:i+1});
          }
        }
        setListings(allListings);
        upd('wfListings', allListings);
        setLoading(false);
      }

       function downloadCSV() {
         const rows = [['图片文件名','变体标题','Color','Bullet1','Bullet2','Bullet3','Bullet4','Bullet5','描述(HTML)','关键词']];
         listings.forEach(function(lst){
           if(lst.error) return;
           const bullets = lst.bullets||['','','','',''];
           rows.push([
             lst.imageName||lst.imageIdx||'',
             lst.title||'',lst.color||'',
             bullets[0]||'',bullets[1]||'',bullets[2]||'',bullets[3]||'',bullets[4]||'',
             lst.description||'',lst.search_terms||''
           ]);
         });
         const csv = rows.map(function(r){return r.map(function(c){return '"'+(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
         const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
         const a = document.createElement('a');
         a.href = URL.createObjectURL(blob);
         a.download = 'listing_'+(theme.nameCN||theme.name||'export')+'_'+Date.now()+'.csv';
         a.click();
       }

      function handleConfirm() {
        onConfirm({
          id:Date.now().toString(),
          themeName:theme.nameCN||theme.name||theme.en,
          emoji:theme.emoji||'📦',
          cat:cat,
          line:lineInfo.line||'',
          gender:lineInfo.gender||data.gender||'',
          ageGroup:lineInfo.ageGroup||data.ageGroup||'',
          approvedCount:approvedImages.length,
          listingCount:listings.length,
          confirmedAt:new Date().toISOString(),
          done:false
        });
      }

      return <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div style={{fontWeight:800,fontSize:18,color:colors.ac}}>Step 6 — Listing文案生成</div>

        {/* 开发信息摘要 */}
        <div style={{background:colors.ac+'10',borderRadius:10,padding:'10px 14px',border:'1px solid '+colors.ac+'25'}}>
          <div style={{fontSize:11,color:'#64748b',fontWeight:600,marginBottom:4}}>本次开发信息（自动带入文案）</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <span style={{fontSize:11,padding:'2px 8px',background:colors.ac+'20',color:colors.ac,borderRadius:4,fontWeight:700}}>
              {lineInfo.line||''}
            </span>
            <span style={{fontSize:11,padding:'2px 8px',background:'#f0fdf4',color:'#15803d',borderRadius:4,fontWeight:700}}>
              {theme.nameCN||theme.name||''}
            </span>
            <span style={{fontSize:11,padding:'2px 8px',background:'#fdf4ff',color:'#7e22ce',borderRadius:4,fontWeight:700}}>
              {{girl:'女童',boy:'男童',unisex:'通用'}[lineInfo.gender||data.gender||'']||'通用'} {lineInfo.ageGroup||data.ageGroup||''}岁
            </span>
            <span style={{fontSize:11,color:'#64748b'}}>
              {approvedImages.length}张已选图
            </span>
          </div>
        </div>

        {/* 图片来源区 */}
        <div style={{background:'#f8fafc',borderRadius:10,padding:14,border:'1px solid #e2e8f0',display:'flex',flexDirection:'column',gap:10}}>
          <div style={{fontWeight:700,fontSize:13,color:'#374151'}}>🖼️ 图片来源</div>

          {/* 上一步选的图 */}
          {approvedImages.length>0&&<div>
            <div style={{fontSize:11,color:'#64748b',fontWeight:600,marginBottom:6}}>来自生图步骤（{approvedImages.length}张）</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {approvedImages.map(function(img,i){
                return <div key={i} style={{position:'relative'}}>
                  <img src={img.url} style={{width:52,height:52,objectFit:'cover',borderRadius:6,border:'2px solid #10b981'}} />
                  <div style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(0,0,0,0.5)',borderRadius:'0 0 4px 4px',fontSize:8,color:'white',textAlign:'center',padding:'1px'}}>{img.comboName||''}</div>
                </div>;
              })}
            </div>
          </div>}

          {/* 手动上传 */}
          <div>
            <div style={{fontSize:11,color:'#64748b',fontWeight:600,marginBottom:6}}>手动上传图片（可多选，支持MJ/Ideogram生成的图）</div>
            <label style={{display:'inline-flex',alignItems:'center',gap:6,padding:'8px 16px',background:'white',
              border:'2px dashed #d1d5db',borderRadius:8,cursor:'pointer',fontSize:12,color:'#475569',fontWeight:600}}>
              📁 选择图片（可多选）
              <input type="file" accept="image/*" multiple onChange={handleImgUpload}
                style={{display:'none'}} />
            </label>
            {uploadedImgs.length>0&&<div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
              {uploadedImgs.map(function(img,i){
                return <div key={i} style={{position:'relative'}}>
                  <img src={img.dataUrl} style={{width:52,height:52,objectFit:'cover',borderRadius:6,border:'1px solid #e2e8f0'}} />
                  <button onClick={function(){setUploadedImgs(function(prev){return prev.filter(function(_,j){return j!==i;});});}}
                    style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',
                      background:'#ef4444',color:'white',border:'none',fontSize:9,cursor:'pointer',fontWeight:700,
                      display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                  <div style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(0,0,0,0.5)',
                    borderRadius:'0 0 4px 4px',fontSize:7,color:'white',textAlign:'center',padding:'1px',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{img.name}</div>
                </div>;
              })}
              <button onClick={function(){setUploadedImgs([]);}}
                style={{padding:'4px 10px',background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:6,fontSize:11,cursor:'pointer',fontWeight:700}}>
                清除全部
              </button>
            </div>}
          </div>

          {/* 侵权扫描 */}
          {(approvedImages.length>0||uploadedImgs.length>0)&&<div style={{borderTop:'1px solid #e2e8f0',paddingTop:10}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:'#374151'}}>🛡️ 侵权扫描（可选）</div>
                <div style={{fontSize:11,color:'#64748b'}}>需要检查时再点击，不强制</div>
              </div>
              <button onClick={runCpScan} disabled={cpScanning}
                style={{padding:'7px 16px',background:cpScanning?'#94a3b8':'#ef4444',color:'white',
                  border:'none',borderRadius:8,fontWeight:700,fontSize:12,cursor:cpScanning?'not-allowed':'pointer'}}>
                {cpScanning?'⏳ 扫描中...':'🔍 开始扫描'}
              </button>
            </div>
            {Object.keys(cpScanState).length>0&&<div style={{marginTop:8,display:'flex',flexDirection:'column',gap:4}}>
              {Object.entries(cpScanState).map(function(entry){
                const key=entry[0]; const sc=entry[1];
                const color=sc.status==='danger'?'#ef4444':sc.status==='warning'?'#f59e0b':'#10b981';
                const icon=sc.status==='danger'?'⛔':sc.status==='warning'?'⚠️':sc.status==='scanning'?'⏳':'✅';
                return <div key={key} style={{padding:'6px 10px',background:'white',borderRadius:6,border:'1px solid '+color+'40',fontSize:11,display:'flex',gap:6,alignItems:'center'}}>
                  <span>{icon}</span>
                  <span style={{color:'#374151',fontWeight:600,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sc.name||key.slice(-20)}</span>
                  <span style={{color:color,fontWeight:700}}>{sc.status==='scanning'?'扫描中':sc.status==='danger'?'高风险':sc.status==='warning'?'需注意':'安全'}</span>
                  {sc.note&&<span style={{color:'#94a3b8',fontSize:10}}>{sc.note}</span>}
                </div>;
              })}
            </div>}
          </div>}
        </div>

        {/* 子类目选择 */}
        <div>
          <div style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:6}}>选择子类目（关键词库）</div>
          <select value={selCat} onChange={function(e){setSelCat(e.target.value);upd('listingSelCat',e.target.value);}}
            style={{width:'100%',padding:'9px 12px',borderRadius:8,border:'1px solid #d1d5db',fontSize:13,outline:'none'}}>
            <option value=''>-- 选择类目 --</option>
            {Object.entries(kwDb).map(function(entry){return <option key={entry[0]} value={entry[0]}>{entry[1].d}</option>;})}
          </select>
        </div>

        {/* 自定义补充 */}
        <div>
          <div style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:6}}>✏️ 补充说明（选填）</div>
          <textarea value={customNote} onChange={function(e){setCustomNote(e.target.value);upd('listingCustomNote',e.target.value);}}
            placeholder="如识图不准，可补充：图案主题、特殊元素、目标节日、卖点等..."
            style={{width:'100%',minHeight:56,padding:'8px 12px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:12,outline:'none',resize:'vertical',boxSizing:'border-box'}} />
        </div>

        {/* 生成按钮 */}
        <button onClick={generateListings} disabled={loading||(!approvedImages.length&&!uploadedImgs.length)||!selCat}
          style={{width:'100%',padding:'13px',background:loading?'#94a3b8':((approvedImages.length||uploadedImgs.length)&&selCat)?colors.ac:'#e2e8f0',
            color:((approvedImages.length||uploadedImgs.length)&&selCat&&!loading)?'white':'#94a3b8',
            border:'none',borderRadius:10,fontWeight:800,fontSize:14,cursor:loading?'not-allowed':'pointer'}}>
          {loading?'⏳ 识图+生成文案中...':'📝 生成Listing文案（'+(approvedImages.length+uploadedImgs.length)+'张）'}
        </button>

        {/* Listing结果 */}
        {listings.length>0&&!loading&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontWeight:700,fontSize:13,color:'#374151'}}>📋 生成结果（{listings.length}条）</div>
            <button onClick={downloadCSV}
              style={{padding:'6px 14px',background:'#16a34a',color:'white',border:'none',borderRadius:6,fontSize:12,fontWeight:700,cursor:'pointer'}}>
              📥 下载CSV
            </button>
          </div>

          {/* 父ASIN标题 */}
          {listings[0]&&listings[0].title&&<div style={{border:'3px solid '+colors.ac,borderRadius:10,overflow:'hidden'}}>
            <div style={{background:colors.ac,padding:'8px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontWeight:800,fontSize:13,color:'white'}}>📦 Listing标题参考</div>
              <CopyBtn text={listings[0].title} label="复制" />
            </div>
            <div style={{padding:'12px 14px',background:'#f0fdf4'}}>
              <div style={{fontSize:14,fontWeight:700,color:'#1e293b',lineHeight:1.6}}>{listings[0].title}</div>
              <div style={{fontSize:11,color:'#64748b',marginTop:4}}>{listings[0].title.length}/150字符</div>
            </div>
          </div>}

          {listings.map(function(lst,li){
            if(lst.error) return <div key={li} style={{padding:12,background:'#fef2f2',borderRadius:8,border:'1px solid #fecaca',fontSize:12,color:'#dc2626'}}>❌ 第{lst.imageIdx}张生成失败：{lst.error}</div>;
            return <div key={li} style={{border:'2px solid '+colors.ac+'40',borderRadius:10,overflow:'hidden'}}>
              <div style={{background:colors.ac+'15',padding:'8px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <img src={lst.imageUrl} style={{width:36,height:36,objectFit:'cover',borderRadius:4}} />
                  <div style={{fontWeight:700,fontSize:13,color:colors.ac}}>图片{lst.imageIdx} · {lst.comboName}</div>
                </div>
                <CopyBtn text={[lst.title,'Color: '+lst.color,...(lst.bullets||[]),lst.description,lst.search_terms].join('\n\n')} label="📋 复制全部" />
              </div>
              <div style={{padding:'10px 14px',display:'flex',flexDirection:'column',gap:8}}>
                {/* 识图结果 */}
                {lst.imgAnalysis&&<div style={{padding:'6px 10px',background:'#f8fafc',borderRadius:6,fontSize:11,color:'#64748b'}}>
                  识图：{(lst.imgAnalysis.elements||[]).join(' · ')} {lst.imgAnalysis.text_on_design?'| 文字："'+lst.imgAnalysis.text_on_design+'"':''}
                </div>}
                <div style={{background:'#f8fafc',borderRadius:6,padding:'8px 10px'}}>
                  <div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:3}}>子变体标题</div>
                  <div style={{fontSize:13,fontWeight:600,color:'#1e293b'}}>{lst.title}</div>
                </div>
                <div style={{background:'#f8fafc',borderRadius:6,padding:'8px 10px'}}>
                  <div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:3}}>Color</div>
                  <div style={{fontSize:12,color:'#374151'}}>{lst.color}</div>
                </div>
                {(lst.bullets||[]).map(function(b,bi){return <div key={bi} style={{padding:'6px 10px',background:'#f8fafc',borderRadius:6}}>
                  <div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:2}}>Bullet {bi+1}</div>
                  <div style={{fontSize:12,color:'#374151',lineHeight:1.5}}>{b}</div>
                </div>;})}
                <div style={{padding:'8px 10px',background:'#f8fafc',borderRadius:6}}>
                  <div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:2}}>描述</div>
                  <div style={{fontSize:12,color:'#374151',lineHeight:1.6}}>{lst.description}</div>
                </div>
                <div style={{padding:'8px 10px',background:'#eff6ff',borderRadius:6}}>
                  <div style={{fontSize:10,color:'#1d4ed8',fontWeight:600,marginBottom:2}}>关键词</div>
                  <div style={{fontSize:12,color:'#1e293b'}}>{lst.search_terms}</div>
                </div>
              </div>
            </div>;
          })}
        </div>}

        {/* 确认完成 */}
        <button onClick={handleConfirm}
          style={{background:colors.ac,color:'white',width:'100%',padding:'14px',fontSize:16,fontWeight:800,border:'none',borderRadius:10,cursor:'pointer'}}>
          ✅ 完成开发，同步到看板
        </button>
        <button onClick={onBack} style={{background:'#f1f5f9',color:'#475569',border:'none',borderRadius:10,padding:'12px',fontSize:13,cursor:'pointer',width:'100%'}}>← 上一步</button>
      </div>;
    }

    // ════════════════════════════════════════════════════════════════
    // PAGE: LISTING (4栏可视化)
    // ════════════════════════════════════════════════════════════════

    // ════════════════════════════════════════════════════════════════
    // APLUS CANVAS COMPONENT
    // ════════════════════════════════════════════════════════════════
    function AplusCanvas({images,colors,cat}) {
      const [layout,setLayout] = useState('left-right');
      const [bgColor,setBgColor] = useState('#FFFFFF');
      const [acColor,setAcColor] = useState(colors.ac);
      const [headline,setHeadline] = useState('');
      const [subtext,setSubtext] = useState('');
      const [selImg,setSelImg] = useState(0);
      const [fontSize,setFontSize] = useState(32);
      const [ownImgs,setOwnImgs] = useState([]);
      const [selOwnImg,setSelOwnImg] = useState(0);
      const canvasRef = React.useRef(null);
      // Canvas size: Amazon A+ recommended 970x600 or 1464x600
      const CW=1464,CH=600;

      const layouts=[
        {id:'left-right',label:'◧ 左图右文'},
        {id:'overlay',label:'⬛ 全图叠字'},
        {id:'top-bottom',label:'⬒ 上图下文'},
        {id:'split',label:'⬕ 分栏对比'},
        {id:'banner',label:'▬ 横幅Banner'},
      ];

      const allImages = ownImgs.length>0 ? ownImgs : images;
      const curImg = allImages[selOwnImg]||allImages[selImg];

      React.useEffect(function(){drawCanvas();},[layout,bgColor,acColor,headline,subtext,selImg,selOwnImg,fontSize,images,ownImgs]);

      function handleOwnUpload(e){
        const files=Array.from(e.target.files);
        const readers=files.map(function(f){
          return new Promise(function(resolve){
            const r=new FileReader();
            r.onload=function(ev){resolve({name:f.name,dataUrl:ev.target.result});};
            r.readAsDataURL(f);
          });
        });
        Promise.all(readers).then(function(imgs){setOwnImgs(function(prev){return [...prev,...imgs];});setSelOwnImg(0);});
      }

      function drawCanvas(){
        const canvas=canvasRef.current;
        if(!canvas)return;
        const ctx=canvas.getContext('2d');
        const W=canvas.width,H=canvas.height;
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle=bgColor;
        ctx.fillRect(0,0,W,H);
        const hl=headline||(cat==='童装'?'Premium Kids Design':'Quality Home Decor');
        const sub=subtext||'Unique Handcrafted Pattern';

        function finishText(){
          if(layout==='left-right'){
            ctx.fillStyle=acColor+'12';ctx.fillRect(0,0,W*0.5,H);
            ctx.fillStyle=acColor;ctx.fillRect(W*0.5,0,3,H);
            ctx.fillStyle=acColor;ctx.font='bold '+fontSize+'px Arial';ctx.textAlign='center';
            ctx.fillText(hl,W*0.75,H*0.38,W*0.44);
            ctx.fillRect(W*0.55,H*0.28,80,4);
            ctx.fillStyle='#475569';ctx.font=(fontSize*0.55)+'px Arial';
            wrapText(ctx,sub,W*0.75,H*0.52,W*0.44,fontSize*0.72);
          } else if(layout==='overlay'){
            const grad=ctx.createLinearGradient(0,H*0.45,0,H);
            grad.addColorStop(0,'transparent');grad.addColorStop(1,acColor+'EE');
            ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
            ctx.fillStyle='white';ctx.font='bold '+fontSize+'px Arial';ctx.textAlign='center';
            ctx.fillText(hl,W/2,H*0.72,W*0.9);
            ctx.font=(fontSize*0.5)+'px Arial';
            wrapText(ctx,sub,W/2,H*0.84,W*0.85,fontSize*0.65);
          } else if(layout==='top-bottom'){
            ctx.fillStyle=acColor+'10';ctx.fillRect(0,H*0.62,W,H*0.38);
            ctx.strokeStyle=acColor;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(40,H*0.62);ctx.lineTo(W-40,H*0.62);ctx.stroke();
            ctx.fillStyle=acColor;ctx.font='bold '+fontSize+'px Arial';ctx.textAlign='center';
            ctx.fillText(hl,W/2,H*0.74,W*0.9);
            ctx.fillStyle='#475569';ctx.font=(fontSize*0.52)+'px Arial';
            wrapText(ctx,sub,W/2,H*0.86,W*0.85,fontSize*0.65);
          } else if(layout==='split'){
            ctx.strokeStyle='#cbd5e1';ctx.lineWidth=2;ctx.setLineDash([8,4]);
            ctx.beginPath();ctx.moveTo(W/2,30);ctx.lineTo(W/2,H-30);ctx.stroke();ctx.setLineDash([]);
            ctx.fillStyle=acColor;ctx.font='bold '+(fontSize*0.65)+'px Arial';ctx.textAlign='center';
            ctx.fillText('BEFORE',W*0.25,H*0.14,W*0.44);ctx.fillText('AFTER',W*0.75,H*0.14,W*0.44);
            ctx.fillStyle='#64748b';ctx.font=(fontSize*0.45)+'px Arial';
            wrapText(ctx,sub,W/2,H*0.9,W*0.9,fontSize*0.58);
          } else if(layout==='banner'){
            ctx.fillStyle=acColor;ctx.fillRect(0,0,W,H*0.16);ctx.fillRect(0,H*0.84,W,H*0.16);
            ctx.fillStyle='white';ctx.font='bold '+(fontSize*0.65)+'px Arial';ctx.textAlign='center';
            ctx.fillText(hl,W/2,H*0.11,W*0.85);ctx.font=(fontSize*0.45)+'px Arial';
            ctx.fillText(sub,W/2,H*0.91,W*0.85);
          }
        }

        // Draw image maintaining aspect ratio (contain mode)
        function drawContain(ctx, img, x, y, w, h, padding) {
          const p = padding||0;
          const dx=x+p, dy=y+p, dw=w-p*2, dh=h-p*2;
          const scale = Math.min(dw/img.width, dh/img.height);
          const sw = img.width*scale, sh = img.height*scale;
          const ox = dx+(dw-sw)/2, oy = dy+(dh-sh)/2;
          ctx.drawImage(img, ox, oy, sw, sh);
        }

        const imgSrc=curImg?curImg.dataUrl:null;
        if(imgSrc){
          const image=new Image();
          image.onload=function(){
            if(layout==='left-right'){
              drawContain(ctx,image,W*0.02,H*0.04,W*0.46,H*0.92,10);
            } else if(layout==='overlay'){
              drawContain(ctx,image,0,0,W,H,0);
            } else if(layout==='top-bottom'){
              drawContain(ctx,image,W*0.1,H*0.01,W*0.8,H*0.58,8);
            } else if(layout==='split'){
              drawContain(ctx,image,W*0.06,H*0.18,W*0.38,H*0.65,6);
              drawContain(ctx,image,W*0.56,H*0.18,W*0.38,H*0.65,6);
            } else if(layout==='banner'){
              drawContain(ctx,image,W*0.12,H*0.17,W*0.76,H*0.65,8);
            }
            finishText();
          };
          image.onerror=finishText;
          image.src=imgSrc;
        } else {
          ctx.fillStyle=acColor+'18';
          if(layout==='left-right') ctx.fillRect(W*0.02,H*0.06,W*0.46,H*0.88);
          else if(layout==='overlay') ctx.fillRect(0,0,W,H);
          else if(layout==='top-bottom') ctx.fillRect(W*0.15,H*0.01,W*0.7,H*0.58);
          else if(layout==='split'){ctx.fillRect(W*0.06,H*0.18,W*0.38,H*0.65);ctx.fillRect(W*0.56,H*0.18,W*0.38,H*0.65);}
          else ctx.fillRect(W*0.12,H*0.17,W*0.76,H*0.65);
          ctx.fillStyle=acColor+'60';ctx.font='16px Arial';ctx.textAlign='center';
          const px=layout==='left-right'?W*0.25:W/2,py=layout==='top-bottom'?H*0.3:H*0.5;
          ctx.fillText('Upload image to preview',px,py);
          finishText();
        }
      }

      function wrapText(ctx,text,x,y,maxW,lineH){
        if(!text)return;
        const words=text.split(' ');let line='';
        for(let i=0;i<words.length;i++){
          const test=line+words[i]+' ';
          if(ctx.measureText(test).width>maxW&&i>0){ctx.fillText(line.trim(),x,y);line=words[i]+' ';y+=lineH;}
          else line=test;
        }
        ctx.fillText(line.trim(),x,y);
      }

      function downloadAplus(){
        const canvas=canvasRef.current;if(!canvas)return;
        const a=document.createElement('a');
        a.download='Aplus_'+layout+'_'+(new Date().toISOString().slice(0,10))+'.png';
        a.href=canvas.toDataURL('image/png',1.0);a.click();
      }

      return <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div style={{padding:'10px 12px',background:'#eff6ff',borderRadius:8,fontSize:11,color:'#1e40af',border:'1px solid #bfdbfe'}}>
          📐 画布尺寸：<strong>1464×600px</strong>(符合Amazon A+模块规格)· 下载PNG直接上传使用
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {layouts.map(function(l){return <button key={l.id} onClick={function(){setLayout(l.id);}}
            className="btn" style={{background:layout===l.id?acColor:'#f1f5f9',color:layout===l.id?'white':'#475569',padding:'6px 12px',fontSize:12}}>
            {l.label}
          </button>;})}
        </div>

        <div style={{border:'2px dashed '+acColor+'60',borderRadius:8,padding:'10px 14px',background:acColor+'06'}}>
          <div style={{fontSize:12,fontWeight:700,color:acColor,marginBottom:6}}>📤 上传图片(支持多张)</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            <label style={{padding:'6px 14px',background:acColor,color:'white',borderRadius:6,fontSize:12,cursor:'pointer',fontWeight:600}}>
              + 选择图片
              <input type="file" accept="image/*" multiple onChange={handleOwnUpload} style={{display:'none'}} />
            </label>
            {ownImgs.length>0&&<button onClick={function(){setOwnImgs([]);setSelOwnImg(0);}} style={{padding:'4px 10px',background:'#f1f5f9',border:'none',borderRadius:6,fontSize:11,cursor:'pointer',color:'#64748b'}}>清除</button>}
            {images.length>0&&ownImgs.length===0&&<span style={{fontSize:11,color:'#64748b'}}>或使用Panel 1上传的图片</span>}
          </div>
          {ownImgs.length>1&&<div style={{display:'flex',gap:5,marginTop:8,flexWrap:'wrap'}}>
            {ownImgs.map(function(img,i){return <button key={i} onClick={function(){setSelOwnImg(i);}}
              className="btn" style={{background:selOwnImg===i?acColor:'#f1f5f9',color:selOwnImg===i?'white':'#475569',fontSize:11,padding:'3px 10px'}}>
              图{i+1}
            </button>;})}
          </div>}
          {images.length>1&&ownImgs.length===0&&<div style={{display:'flex',gap:5,marginTop:8,flexWrap:'wrap'}}>
            {images.map(function(img,i){return <button key={i} onClick={function(){setSelImg(i);}}
              className="btn" style={{background:selImg===i?acColor:'#f1f5f9',color:selImg===i?'white':'#475569',fontSize:11,padding:'3px 10px'}}>
              图{i+1}
            </button>;})}
          </div>}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          <div>
            <div style={{fontSize:11,color:'#64748b',marginBottom:3}}>背景色</div>
            <input type="color" value={bgColor} onChange={function(e){setBgColor(e.target.value);}} style={{width:'100%',height:32,border:'none',cursor:'pointer',borderRadius:4}} />
          </div>
          <div>
            <div style={{fontSize:11,color:'#64748b',marginBottom:3}}>主题色</div>
            <input type="color" value={acColor} onChange={function(e){setAcColor(e.target.value);}} style={{width:'100%',height:32,border:'none',cursor:'pointer',borderRadius:4}} />
          </div>
          <div>
            <div style={{fontSize:11,color:'#64748b',marginBottom:3}}>字号 {fontSize}px</div>
            <input type="range" min="18" max="56" value={fontSize} onChange={function(e){setFontSize(Number(e.target.value));}} style={{width:'100%',marginTop:6}} />
          </div>
        </div>
        <input type="text" value={headline} onChange={function(e){setHeadline(e.target.value);}} placeholder="主标题(留空自动生成)" style={{padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:6,fontSize:12}} />
        <input type="text" value={subtext} onChange={function(e){setSubtext(e.target.value);}} placeholder="副文字 / 卖点描述" style={{padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:6,fontSize:12}} />
        <canvas ref={canvasRef} width={CW} height={CH} style={{width:'100%',borderRadius:8,border:'1px solid #e2e8f0',background:'#f8fafc'}} />
        <button onClick={downloadAplus} style={{background:'#16a34a',color:'white',border:'none',borderRadius:8,padding:'12px',fontSize:14,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          📥 下载 A+ 图片 (PNG · 1464×600 · 高清)
        </button>
      </div>;
    }

    // ══════════════════════════════════════════════════════
    // 趋势库工具函数(KV优先，localStorage备用)
    // ══════════════════════════════════════════════════════
    function getTrendLib(cat) {
      return JSON.parse(localStorage.getItem('trend_lib_'+cat)||'[]');
    }
    function saveTrendLib(cat, data) {
      localStorage.setItem('trend_lib_'+cat, JSON.stringify(data));
    }
    function getLatestTrend(cat) {
      const lib = getTrendLib(cat);
      return lib.length>0 ? lib[0] : null;
    }
    async function fetchTrendFromKV(cat) {
      const workerUrl = getPodWorkerUrl();
      if(!workerUrl) return null;
      try {
        // 使用专用路径避免Bot检测
        const resp = await fetch(workerUrl.replace(/\/+$/,'')+'/trend-read?cat='+encodeURIComponent(cat), {
          method: 'GET',
          headers: {'Content-Type':'application/json'}
        });
        const d = await resp.json();
        if(d.ok && d.data && d.data.length>0) {
          // 同步到localStorage作为离线缓存
          saveTrendLib(cat, d.data);
          return d.data;
        }
      } catch(e) { console.warn('KV读取失败，使用本地缓存:', e.message); }
      return null;
    }

            + '}';
          const raw = await callClaudeAPI(prompt, 'POD趋势分析专家，只输出JSON');
          const cleaned = raw.replace(/```json|```/g,'').trim();
          const si=cleaned.indexOf('{'), ei=cleaned.lastIndexOf('}');

            </div>
        }
      </div>;
    }

      function compressImage(dataUrl, maxBytes) {
        return new Promise(function(resolve) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement('canvas');
            var w=img.width, h=img.height, maxDim=1800;
            if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}else{w=Math.round(w*maxDim/h);h=maxDim;}}
            canvas.width=w; canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            var q=0.82, result=canvas.toDataURL('image/jpeg',q);
            while(result.length*0.75>(maxBytes||4000000)&&q>0.3){q-=0.1;result=canvas.toDataURL('image/jpeg',q);}
            resolve(result);
          };
          img.src = dataUrl;
        });
      }

      function handleImg(e) {
        var files = Array.from(e.target.files);
        if(!files.length) return;
        Promise.all(files.map(function(file) {
          return new Promise(function(res) {
            var r = new FileReader();
            r.onload = function(ev) {
              compressImage(ev.target.result, 4000000).then(function(compressed) {
                res({name: file.name, data: compressed});
              });
            };
            r.readAsDataURL(file);
          });
        })).then(function(newImgs) {
          setImages(function(prev) {
            var merged = prev.concat(newImgs);
            persist({imageNames:merged.map(function(x){return x.name;}),cpResults:[],listings:[],aplusPrompts:[],videoPrompts:[]});
            return merged;
          });
          setCpResults([]); setListings([]); setAplusPrompts([]); setVideoPrompts([]);
        });
      }

      function removeImage(idx) {
        setImages(function(prev) {
          var updated = prev.filter(function(_,i){return i!==idx;});
          persist({imageNames:updated.map(function(x){return x.name;})});
          return updated;
        });
        setCpResults([]); setListings([]);

          var cp2 =

            +'=== PRODUCT INFO ===\n'

            +'=== TITLE (A9 + RUFUS) ===\n'
            +'Template: [Core Keyword] [Key Spec/Material] – for [Main Use Scene], [Core Benefit], [Extra Advantage]\n'

            +'Rules:\n'
            +'• Front of title: primary search keyword + key spec → satisfies A9 indexing\n'

            +'Example Parent: Tapestry Wall Backdrop 5x3ft - for Party Decoration, Vivid Print, Easy Hanging\n'

            +'For THIS listing, prepend the design descriptor to parent title: "'+parentTitle+'"\n'
            +'Design descriptor to prepend: "'+info.elemStr+(info.holiday&&info.holiday!='null'?' '+info.holiday:'')+' "\n'
            +'Max 150 chars. If too long, shorten design descriptor only - keep parent structure intact\n'
            +'Title Case: capitalize every content word. Lowercase only: a an the and but or for nor at by in of on to up with\n'
            +'ZERO duplicate words - every word appears only once in the entire title\n'
            +'Remove all keywords: title must still clearly describe the product\n\n'
            +'=== BULLETS (A9 + COSMO + RUFUS) ===\n'
            +'Template per bullet: [Scene/Condition] + [Problem or Need] → [How this product solves it] + [Result]\n'
            +'Example: "For holiday gatherings, this backdrop transforms any wall into a stunning photo station so every guest gets the perfect shot."\n'
            +'Write exactly 5 bullets:\n'
            +'B1: When/where this shines - open with a specific scene. Show the product in real use.\n'
            +'B2: What makes this design special - the emotion or visual impact it creates\n'
            +'B3: Product quality and construction - why it lasts and photographs well\n'
            +'B4: Gift angle - who to give it to and why they will love receiving it\n'
            +'B5: Practical details - dimensions, care instructions, setup ease\n'
            +'Each bullet: 150-190 chars. Start with 2-3 ALL-CAPS words + " - ". Then write a natural, complete sentence.\n'
            +'ZERO duplicate words across all 5 bullets. Every bullet must have a different sentence structure.\n'
            +'COSMO tags: each bullet implicitly signals a scene or lifestyle context for recommendation matching.\n\n'

            +'=== DESCRIPTION (COSMO + RUFUS) ===\n'
            +'Template: [Who it helps + what problem] → [How they use it in real life] → [Why it\'s better than basic]\n'
            +'3-5 paragraphs, 280-350 words. Amazon HTML: <b>key phrase</b> for 3-5 phrases, <br><br> between paragraphs.\n'
            +'P1 (Hook): Who is this product for and what moment does it create? Open with the person and scene - not the product.\n'
            +'P2 (Real Usage): Specific real-life situations where this gets used. Be visual and concrete.\n'
            +'P3 (Differentiation): What makes this better than a plain/basic version? Design, quality, emotion.\n'
            +'P4 (Gift/Occasion): Why this makes a meaningful gift or purchase for '+(_occasion||'this occasion or lifestyle')+'.\n'
            +'P5 (CTA): One warm sentence + call to action.\n'
            +'Write flowing prose - not lists. Vary sentence length: mix short punchy sentences with longer descriptive ones.\n'
            +'RUFUS test: remove all keywords - the description must still fully explain the product to a human.\n\n'

            +'=== SEARCH TERMS (A9 only) ===\n'
            +'Purpose: supplement keywords NOT already covered in the title.\n'
            +'Source pool (use only from this list): '+kwAll
            +(_occasion ? ' '+_occasion.toLowerCase()+' gift '+_occasion.toLowerCase()+' decor' : '')+'\n'
            +'Rules:\n'
            +'• Ordered left to right by search relevance - highest volume/most relevant first\n'
            +'• Space-separated only, NO commas\n'

            +'• Do NOT include any word already used in child_title\n'
            +'• Count characters carefully. Hard limit: under 250 characters total\n\n'

            +'Output valid JSON only, no markdown:\n'
            +'{"child_title":"...","color":"'+colorField+'","bullets":["B1","B2","B3","B4","B5"],"description":"HTML","search_terms":"words"}';

          try{

            if(p&&p.search_terms){

                var kw=_kws[ki].toLowerCase().replace(/[^a-z0-9]/g,'');
                if(!kw||_seen[kw]||_titleWords.indexOf(kw)>=0) continue;

      function downloadCSV() {
        if(!listings.length)return;
        const esc=function(s){return '"'+(s||'').toString().replace(/"/g,'""')+'"';};
        const kwTrim=function(kw){if(!kw)return '';const ws=kw.trim().split(/\s+/);let r='';for(let i=0;i<ws.length;i++){const n=(r?r+' ':'')+ws[i];if(n.length>250)break;r=n;}return r;};
        const header=['类型','图片/说明','标题','Color','Bullet 1','Bullet 2','Bullet 3','Bullet 4','Bullet 5','描述(HTML)','关键词(≤250字)'];
        const parentRow=['PARENT','父ASIN',listings[0]&&listings[0].parentTitle||'','','','','','','','',''];
        const childRows=listings.map(function(l,li){return ['CHILD-'+(li+1),l.imageName||'',l.title||'',l.color||'',
          (l.bullets||[])[0]||'',(l.bullets||[])[1]||'',(l.bullets||[])[2]||'',(l.bullets||[])[3]||'',(l.bullets||[])[4]||'',
          l.description||'',kwTrim(l.search_terms||l.keywords||'')];});
        const csv=[header,parentRow,...childRows].map(function(r){return r.map(esc).join(',');}).join('\r\n');
        const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
        const url=URL.createObjectURL(blob);const a=document.createElement('a');
        a.href=url;a.download='Listing_'+cat+'_'+new Date().toISOString().slice(0,10)+'.csv';
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      }

      // ── Upload image to GitHub ──────────────────────────────────
      async function uploadToGitHub(base64Data, filename) {
        if(!ghToken||!ghRepo||!ghOwner) throw new Error('请先配置GitHub Token');
        // Remove data:image/...;base64, prefix
        const content = base64Data.includes(',') ? base64Data.split(',')[1] : base64Data;
        const path = 'copyright-images/'+filename;
        const url = 'https://api.github.com/repos/'+ghOwner+'/'+ghRepo+'/contents/'+path;
        const res = await fetch(url, {
          method:'PUT',
          headers:{'Authorization':'token '+ghToken,'Content-Type':'application/json'},
          body: JSON.stringify({message:'Add copyright image: '+filename, content:content})
        });
        if(!res.ok) {
          const err = await res.json();
          throw new Error(err.message||'GitHub上传失败');
        }
        const data = await res.json();
        return data.content.download_url;
      }

      // ── Save JSON data file to GitHub (persistent cloud storage) ──
      async function saveJsonToGitHub(data, filename) {
        var ghCfg = JSON.parse(localStorage.getItem('gh_config')||'{}');
        var _token=ghCfg.token||'', _owner=ghCfg.owner||'', _repo=ghCfg.repo||'';
        if(!_token||!_repo||!_owner) return false;
        var path = 'pod-data/'+filename;
        var url = 'https://api.github.com/repos/'+_owner+'/'+_repo+'/contents/'+path;
        var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        var sha = null;
        try {
          var getRes = await fetch(url, {headers:{'Authorization':'token '+_token}});
          if(getRes.ok) { var existing = await getRes.json(); sha = existing.sha; }
        } catch(e) {}
        var body = {message:'Update '+filename+' - '+new Date().toISOString(), content:content};
        if(sha) body.sha = sha;
        var putRes = await fetch(url, {
          method:'PUT',
          headers:{'Authorization':'token '+_token,'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
        return putRes.ok;
      }

      // ── Load JSON data file from GitHub ──────────────────────────
      async function loadJsonFromGitHub(filename) {
        var ghCfg = JSON.parse(localStorage.getItem('gh_config')||'{}');
        var _token=ghCfg.token||'', _owner=ghCfg.owner||'', _repo=ghCfg.repo||'';
        if(!_owner||!_repo) return null;
        var url = 'https://api.github.com/repos/'+_owner+'/'+_repo+'/contents/pod-data/'+filename;
        var headers = _token ? {'Authorization':'token '+_token} : {};
        try {
          var res = await fetch(url, {headers:headers});
          if(!res.ok) return null;
          var file = await res.json();
          var text = decodeURIComponent(escape(atob(file.content.split('\n').join(''))));
          return JSON.parse(text);
        } catch(e) { return null; }
      }
