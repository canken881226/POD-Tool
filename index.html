    // Startup cleanup: strip old base64 images to free localStorage space
      (function cleanOldBase64(){
        try {
          var raw = localStorage.getItem('cp_images_index');
          if(!raw) return;
          var data = JSON.parse(raw);
          var changed = false;
          data.forEach(function(entry) {
            (entry.images||[]).forEach(function(img) {
              if(img.localB64 && img.localB64.length > 100) { img.localB64='[cleared]'; changed=true; }
              if(img.url && img.url.startsWith('data:') && img.url.length > 100) { img.url='[cleared]'; changed=true; }
            });
          });
          if(changed) localStorage.setItem('cp_images_index', JSON.stringify(data));

      g: function(key) { try { const d=localStorage.getItem(key); return d?JSON.parse(d):null; } catch(e) { return null; } },
      s: function(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); return true; } catch(e) { console.error('localStorage.setItem failed for key:',key,'error:',e.message); return false; } }

    const daysUntil = function(dateStr) {
      const diff = new Date(dateStr) - new Date();
      return Math.ceil(diff / (1000*60*60*24));

    const calculatePriorities = function() {
      const today = new Date();
      const month = today.getMonth()+1;
      const weekNum = Math.ceil(today.getDate()/7);
      const priorities = [];
      SYSTEM_DATA.holidays.forEach(function(h) {
        const days = daysUntil(h.date);
        const deadline = days - h.devDays;
        if (deadline<=0 && days>0) priorities.push({urgency:10,type:'holiday_urgent',theme:h,reason:h.name+'已进入开发期！距节日'+days+'天'});
        else if (deadline>0 && deadline<=21) priorities.push({urgency:8,type:'holiday_soon',theme:h,reason:deadline+'天后进入开发期'});
      });
      SYSTEM_DATA.seasons.forEach(function(s) {
        const nm=month+1, fm=month+2;
        if (s.months.includes(month)||s.months.includes(nm)||s.months.includes(fm)) {
          const ending = today.getDate()>20 && s.months[s.months.length-1]===month;
          if (!ending) priorities.push({urgency:7,type:'seasonal',theme:s,reason:s.months.includes(month)?'当前季节窗口期':'即将到来的季节'});
        }
      });
      const evergreen = S.g('evergreen')||SYSTEM_DATA.evergreen;
      const sorted = [...evergreen].sort(function(a,b){return b.weight-a.weight;});
      const si = ((weekNum-1)*2)%sorted.length;
      [sorted[si], sorted[(si+1)%sorted.length]].forEach(function(e,idx) {
        if(e) priorities.push({urgency:6.5-idx*0.3,type:'evergreen',theme:e,reason:'本周常青推荐 #'+(idx+1)+'，权重'+e.weight});
      });
      return priorities.sort(function(a,b){return b.urgency-a.urgency;});
    };

      const apiKey = getApiKey();
      if (!apiKey) throw new Error('请先设置 API Key');
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},

      const data = await resp.json();
      if(!resp.ok||data.error){
        const msg=(data.error&&data.error.message)||('HTTP '+resp.status);
        if(resp.status===400) throw new Error('请求错误(400)：'+msg+' —— 注意：这不是余额问题');

        if(resp.status===401) throw new Error('API Key无效(401)');
        throw new Error(msg);
      }
      return data.content.map(function(i){return i.type==='text'?i.text:'';}).join('\\n');
    };

    const callClaudeWithImage = async function(prompt, imageData, systemPrompt) {
      const apiKey = getApiKey();
      if(!apiKey) throw new Error('请先设置 API Key');
      // Fallback to text-only if no image data
      if(!imageData || imageData.length < 100) {

      var _imgData = imageData;
      if(_imgData.length * 0.75 > 4000000) {
        try { _imgData = await compressImage(_imgData, 4000000); } catch(e) {}
      }
      const base64 = _imgData.includes(',') ? _imgData.split(',')[1] : _imgData;
      var mediaType = _imgData.startsWith('data:image/png')?'image/png':_imgData.startsWith('data:image/gif')?'image/gif':_imgData.startsWith('data:image/webp')?'image/webp':'image/jpeg';

        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},

      });
      if(!resp.ok){const e=await resp.json().catch(function(){return {};});throw new Error((e.error&&e.error.message)||('HTTP '+resp.status));}

    const callClaudeWithSearch = async (systemPrompt, userPrompt) => {
      const apiKey = getApiKey();
      if (!apiKey) throw new Error('请先设置 API Key');

      const runTurn = async (msgs) => {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 4000,
            system: systemPrompt,
            tools: [{ type: "web_search_20250305", name: "web_search" }],
            messages: msgs
          })
        });

        if (!response.ok) {
          const errText = await response.text();
          console.error('HTTP '+response.status+':', errText);
          throw new Error('HTTP '+response.status+': '+errText);
        }

        const data = await response.json();
        if (data.error) {
          console.error("API错误:", JSON.stringify(data.error));
          throw new Error(data.error.message || JSON.stringify(data.error));
        }
        return data;
      };

      const messages = [{ role: "user", content: userPrompt }];
      let data = await runTurn(messages);
      let allText = [];

      // 循环处理tool_use(web_search需要客户端传回tool_result)
      for (let round = 0; round < 8; round++) {
        // 收集text
        for (const b of (data.content || [])) {
          if (b.type === "text" && b.text) allText.push(b.text);
        }

        // 如果没有tool_use或已结束则退出
        const toolUses = (data.content || []).filter(b => b.type === "tool_use");
        if (!toolUses.length || data.stop_reason === "end_turn") break;

        // 构造tool_result回传(web_search结果由API服务器填充，客户端传空确认即可)
        messages.push(
          { role: "assistant", content: data.content },
          { role: "user", content: toolUses.map(tu => ({
              type: "tool_result",
              tool_use_id: tu.id,
              content: tu.type === "tool_use" && tu.name === "web_search"
                ? [{ type: "text", text: "Please continue with your analysis." }]
                : "ok"
            }))
          }
        );

        data = await runTurn(messages);
      }

      // 最后一轮也收集
      for (const b of (data.content || [])) {
        if (b.type === "text" && b.text) allText.push(b.text);
      }

      const result = allText.join("\n").trim();
      if (!result) throw new Error("返回内容为空，请检查API Key是否正确");
      return result;
    };

    // ── Global: get all banned elements + style keywords from both DBs ──
    function getCpBanList() {
      const db1 = S.g('cp_db')||DEFAULT_CP_DB;
      const db2 = S.g('cp_images_index')||[];
      const banned=[], styleKws=[], styleDescs=[];
      [...db1,...db2].forEach(function(e){
        (e.banned_elements||[]).forEach(function(b){if(b&&banned.indexOf(b)<0)banned.push(b);});
        (e.style_keywords||[]).forEach(function(k){if(k&&styleKws.indexOf(k)<0)styleKws.push(k);});
        if(e.style_description) styleDescs.push(e.style_description);
      });
      return {banned:banned, styleKws:styleKws, styleDescs:styleDescs};
    }

    function checkCpRisk(text) {
      const imgLib=(S.g('cp_images_index')||[]).map(function(e){return {...e,banned_elements:e.banned_elements||[],style_keywords:e.style_keywords||[]};});
      const db=[...(S.g('cp_db')||DEFAULT_CP_DB),...imgLib];
      const t = (text||'').toLowerCase();
      // 全词匹配：词语必须是独立单词，不能是其他词的一部分
      function wordMatch(haystack, needle) {
        if(!needle||needle.length<2) return false;
        // 短词(≤3字符)要求严格全词匹配
        // 长词(≥4字符)也要求全词匹配，避免vegeta匹配vegetation
        const escaped = needle.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp('(?<![a-z0-9])' + escaped + '(?![a-z0-9])', 'i');
        return re.test(haystack);
      }
      return db.reduce(function(acc,e) {
        const elHits=(e.banned_elements||[]).filter(function(el){return wordMatch(t, el.toLowerCase());});
        const stHits=(e.style_keywords||[]).filter(function(sk){return wordMatch(t, sk.toLowerCase());});
        if(elHits.length>0||stHits.length>=2) acc.push({entry:e,elHits:elHits,stHits:stHits,level:elHits.length>0?'high':'medium'});
        return acc;
      },[]);
    }

    function CopyBtn({text,label}) {
      const [copied,setCopied] = useState(false);
      return (
        <button onClick={function(){navigator.clipboard.writeText(text);setCopied(true);setTimeout(function(){setCopied(false);},2000);}}
          style={{padding:'4px 10px',borderRadius:6,border:'1px solid '+(copied?'#10b981':'#e2e8f0'),background:copied?'#f0fdf4':'white',fontSize:11,cursor:'pointer',fontWeight:600,color:copied?'#10b981':'#475569',transition:'all 0.2s'}}>
          {copied?'✅ 已复制':(label||'📋 复制')}
        </button>
      );
    }
    function CopyBtnAbs({text}) {
      const [copied,setCopied] = useState(false);
      return <button className="copy-btn-abs"
        onClick={function(){navigator.clipboard.writeText(text);setCopied(true);setTimeout(function(){setCopied(false);},2000);}}
        style={copied?{background:'#10b981',color:'white',border:'none'}:{}}>{copied?'✅':'复制'}</button>;

    function UrgBadge({urgency}) {
      const c = urgency>=9?{bg:'#fee2e2',tc:'#dc2626',t:'🔥 紧急'}
        :urgency>=7?{bg:'#ffedd5',tc:'#ea580c',t:'⚡ 高'}
        :urgency>=5?{bg:'#dbeafe',tc:'#2563eb',t:'📌 中'}
        :{bg:'#dcfce7',tc:'#16a34a',t:'🌿 常青'};
      return <span className="badge" style={{background:c.bg,color:c.tc}}>{c.t}</span>;
    }
    function TagList({items,color}) {
      if(!items||!items.length) return null;
      return <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:6}}>
        {items.map(function(e,i){return <span key={i} className="tag" style={{background:color+'20',color:color}}>{e}</span>;})}
      </div>;
    }

    // ── Global PDF Queue (in-memory, survives React re-renders) ──
    // Files stored in memory array, status tracked in localStorage (small)
    window.PDF_MEM_QUEUE = window.PDF_MEM_QUEUE || []; // {id, fileName, arrayBuf, b64Str, status}
    let PDF_PROCESSOR_RUNNING = false;

    function getPdfStatusList() {
      return (window.PDF_MEM_QUEUE||[]).map(function(q){
        return {id:q.id, fileName:q.fileName, status:q.status, error:q.error||''};
      });
    }

    async function processPdfQueue() {
      // Pre-flight: check API key
      var _preApiKey = localStorage.getItem('pod_api_key') || '';
      if(!_preApiKey) {
        (window.PDF_MEM_QUEUE||[]).forEach(function(q){
          if(q.status==='pending') { q.status='error'; q.error='请先在顶部设置API Key'; }
        });
        window.dispatchEvent(new Event('pdf_queue_update'));
        return;
      }
      // Reset any items stuck as 'processing' (from previous crashed run)
      (window.PDF_MEM_QUEUE||[]).forEach(function(q) {
        if(q.status === 'processing') { q.status = 'pending'; q.error = ''; }
      });
      window.dispatchEvent(new Event('pdf_queue_update'));
      if(PDF_PROCESSOR_RUNNING) return;
      PDF_PROCESSOR_RUNNING = true;
      try {
        while(true) {
          const queue = window.PDF_MEM_QUEUE||[];
          const pending = queue.find(function(q){return q.status==='pending';});
          if(!pending) break;

          // Mark processing
          pending.status = 'processing';
          pending.retries = pending.retries || 0;
          window.dispatchEvent(new Event('pdf_queue_update'));

          // Overall per-file timeout: 120 seconds
          var fileTimeoutId = null;
          var fileTimedOut = false;
          var fileTimeoutPromise = new Promise(function(_, reject) {
            fileTimeoutId = setTimeout(function() {
              fileTimedOut = true;
              reject(new Error('处理超时(超过120秒)，请重试'));
            }, 120000);
          });

          try {
            // Step1: PDF.js extract images from ArrayBuffer (already in memory)
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            // Timeout for PDF loading itself
            const pdfDoc = await Promise.race([
              pdfjsLib.getDocument({data: pending.arrayBuf}).promise,
              new Promise(function(_,reject){setTimeout(function(){reject(new Error('PDF加载超时'));},30000);})
            ]);
            const numPages = pdfDoc.numPages;
            const allImgs = [];
            const pageB64s = [];

            for(let p = 1; p <= Math.min(numPages, 6); p++) {
              const pdfPage = await pdfDoc.getPage(p);
              // Render page at 1.5x for good quality
              const viewport = pdfPage.getViewport({scale: 1.5});
              const canvas = document.createElement('canvas');
              canvas.width = viewport.width;
              canvas.height = viewport.height;
              await pdfPage.render({canvasContext: canvas.getContext('2d', {willReadFrequently:true}), viewport: viewport}).promise;
              pageB64s.push(canvas.toDataURL('image/jpeg', 0.82));

              // Try to extract embedded images
              try {
                const ops = await pdfPage.getOperatorList();
                const OPS = pdfjsLib.OPS;
                const imgNames = [];
                for(let oi = 0; oi < ops.fnArray.length; oi++) {
                  if(ops.fnArray[oi]===OPS.paintImageXObject || ops.fnArray[oi]===OPS.paintImageXObjectRepeat) {
                    const nm = ops.argsArray[oi][0];
                    if(nm && imgNames.indexOf(nm) < 0) imgNames.push(nm);
                  }
                }
                for(let ni = 0; ni < imgNames.length; ni++) {
                  try {
                    const imgData = await Promise.race([
                      new Promise(function(resolve, reject) {
                        pdfPage.objs.get(imgNames[ni], function(obj) { obj ? resolve(obj) : reject(new Error('no obj')); });
                      }),
                      new Promise(function(_,reject){ setTimeout(function(){reject(new Error('timeout'));},4000); })
                    ]);
                    if(!imgData || !imgData.data || imgData.width < 100 || imgData.height < 100) continue;
                    const cv = document.createElement('canvas');
                    cv.width = imgData.width; cv.height = imgData.height;
                    const ctx = cv.getContext('2d', {willReadFrequently:true});
                    const id = ctx.createImageData(imgData.width, imgData.height);
                    if(imgData.data.length === imgData.width * imgData.height * 4) {
                      id.data.set(imgData.data);
                    } else if(imgData.data.length === imgData.width * imgData.height * 3) {
                      for(let pp=0,qq=0; pp<imgData.data.length; pp+=3,qq+=4) {
                        id.data[qq]=imgData.data[pp]; id.data[qq+1]=imgData.data[pp+1];
                        id.data[qq+2]=imgData.data[pp+2]; id.data[qq+3]=255;
                      }
                    } else { continue; }
                    ctx.putImageData(id, 0, 0);
                    allImgs.push({
                      localB64: cv.toDataURL('image/jpeg', 0.88),
                      name: 'p'+p+'_img'+(ni+1)+'.jpg',
                      elements:[], aiDesc:'', w:imgData.width, h:imgData.height
                    });
                  } catch(ie) {}
                }
              } catch(pe) {}
            }

            // Step2: Claude AI extracts text metadata from PDF
            const apiKey = localStorage.getItem('pod_api_key') || '';
            if(!apiKey) throw new Error('未设置API Key，请先在工具顶部设置API Key');

            // Use callClaudeAPI (same fetch path as rest of tool, handles CORS proxy)
            // Build prompt for PDF extraction
            const pdfPrompt = 'This is a copyright infringement notice PDF. Extract key info and output JSON ONLY (no markdown, no explanation): {"plaintiff":"brand or artist name","works":["protected work title"],"style_description":"Chinese: describe the art style","style_keywords":["Chinese style tag","tag2","tag3"],"banned_elements":["Chinese: brand name","work name","distinctive visual element"],"risk_level":"urgent or high","case_no":"","filed_date":""}';
            let rawResult = null;
            // Retry up to 3 times on rate limit
            for(let attempt = 0; attempt < 3; attempt++) {
              if(attempt > 0) {
                const waitSec = attempt === 1 ? 30 : 60;
                pending.error = '触发限速，等待'+waitSec+'秒后重试('+attempt+'/3)...';
                window.dispatchEvent(new Event('pdf_queue_update'));
                await new Promise(function(r){ setTimeout(r, waitSec * 1000); });
                pending.error = '';
              }
              try {
                // Use callClaudeAPI with document content type via direct fetch
                // matching exact same headers as callClaudeAPI
                const apiKey = getApiKey();
                if(!apiKey) throw new Error('请先设置API Key');
                const resp = await fetch('https://api.anthropic.com/v1/messages', {
                  method:'POST',
                  headers:{
                    'Content-Type':'application/json',
                    'x-api-key':apiKey,
                    'anthropic-version':'2023-06-01',
                    'anthropic-dangerous-direct-browser-access':'true'
                  },
                  body: JSON.stringify({
                    model:'claude-sonnet-4-20250514',
                    max_tokens:1500,
                    system:'You are a copyright expert. Output JSON only.',
                    messages:[{role:'user', content:[
                      {type:'document', source:{type:'base64', media_type:'application/pdf', data:pending.b64Str}},

                      {type:'text', text:pdfPrompt}
                    ]}]
                  })
                });
                const rdata = await resp.json();
                if(resp.status === 429 || (rdata.error && rdata.error.type === 'rate_limit_error')) {
                  if(attempt < 2) continue;
                  throw new Error('API限速，请稍后再试');
                }
                if(rdata.error) throw new Error(rdata.error.message||'API error');
                rawResult = (rdata.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
                break;
              } catch(fetchErr) {
                if(attempt >= 2) throw fetchErr;
              }
            }
            const rdata_raw = rawResult;
            let parsed = null;
            try {
              const si = rdata_raw.indexOf('{'), ei = rdata_raw.lastIndexOf('}');
              if(si>=0 && ei>=0) parsed = JSON.parse(rdata_raw.slice(si, ei+1));
            } catch(ex) {}
            if(!parsed) throw new Error('AI无法解析文件内容，请确认是侵权通知文件');

            // Step3: Build final image list
            const meaningful = allImgs.filter(function(img){ return img.w>=100 && img.h>=100; });
            const finalImgs = meaningful.length > 0 ? meaningful :
              pageB64s.map(function(b, idx){ return {localB64:b, name:'page'+(idx+1)+'.jpg', elements:[], aiDesc:'整页', w:0, h:0}; });

            // Step4: Upload images to GitHub (async, non-blocking)
            // Then save TEXT-ONLY entry to localStorage (no base64 = no size limit)
            var ghImgUrls = [];
            var ghCfgNow = JSON.parse(localStorage.getItem('gh_config')||'{}');
            if(ghCfgNow.token && ghCfgNow.owner && ghCfgNow.repo && finalImgs.length > 0) {
              for(var gi=0; gi<Math.min(finalImgs.length,6); gi++) {
                try {
                  var imgUrl = await saveJsonToGitHub(
                    {b64: finalImgs[gi].localB64},
                    'img_'+String(Date.now())+'_'+gi+'.json'
                  );
                  // Actually upload image directly
                  var imgB64 = finalImgs[gi].localB64;
                  var imgContent = imgB64.includes(',') ? imgB64.split(',')[1] : imgB64;
                  var imgPath = 'copyright-images/'+pending.fileName.replace('.pdf','')+'_'+gi+'.jpg';
                  var imgApiUrl = 'https://api.github.com/repos/'+ghCfgNow.owner+'/'+ghCfgNow.repo+'/contents/'+imgPath;
                  var imgRes = await fetch(imgApiUrl, {
                    method:'PUT',
                    headers:{'Authorization':'token '+ghCfgNow.token,'Content-Type':'application/json'},
                    body: JSON.stringify({message:'Add copyright image', content:imgContent})
                  });
                  if(imgRes.ok) {
                    var imgData = await imgRes.json();
                    ghImgUrls.push({
                      url: imgData.content.download_url,
                      name: finalImgs[gi].name||('img_'+gi),
                      elements: finalImgs[gi].elements||[],
                      aiDesc: finalImgs[gi].aiDesc||''
                    });
                  }
                } catch(imgErr) { console.warn('Image upload failed:', imgErr.message); }
              }
            }

            // Save text-only entry to localStorage (NO base64 images)
            const existing = S.g('cp_images_index') || [];
            const newEntry = {
              id: String(Date.now()),
              plaintiff: parsed.plaintiff||'',
              works: parsed.works||[],
              style_description: parsed.style_description||'',
              style_keywords: parsed.style_keywords||[],
              banned_elements: parsed.banned_elements||[],
              risk_level: parsed.risk_level||'high',
              case_no: parsed.case_no||'',
              filed_date: parsed.filed_date||'',
              notes: 'PDF导入：'+pending.fileName,
              images: ghImgUrls,
              createdAt: new Date().toISOString()
            };
            // localStorage only stores text data - tiny size, always fits
            var saved = S.s('cp_images_index', [...existing, newEntry]);
            if(!saved) {
              // If still full, evict oldest 10 and retry
              var trimmed = existing.slice(-10);
              saved = S.s('cp_images_index', [...trimmed, newEntry]);
            }
            if(!saved) {
              // Last resort: save this entry alone (clear all old)
              saved = S.s('cp_images_index', [newEntry]);
            }
            pending.storageNote = ghImgUrls.length > 0 ? ('图片已上传GitHub '+ghImgUrls.length+'张') : '纯文字记录(无GitHub配置)';

            // Also sync banned words to cp_db for immediate use
            const cpDb = S.g('cp_db') || DEFAULT_CP_DB;
            S.s('cp_db', [...cpDb, {
              id: newEntry.id, artist: newEntry.plaintiff, law_firm:'',
              case_no: newEntry.case_no, date: newEntry.filed_date,
              risk_level: newEntry.risk_level, style_description: newEntry.style_description,
              notes: newEntry.notes, banned_elements: newEntry.banned_elements,
              style_keywords: newEntry.style_keywords
            }]);

            pending.status = 'done';
            pending.result = newEntry;
            // Async sync to GitHub (no await - don't block queue)
            if(localStorage.getItem('gh_config')) {
              try {
                var ghCfg = JSON.parse(localStorage.getItem('gh_config')||'{}');
                if(ghCfg.token && ghCfg.owner && ghCfg.repo) {
                  var allEntries = S.g('cp_images_index')||[];
                  var stripped = allEntries.map(function(e){return {id:e.id,plaintiff:e.plaintiff,works:e.works,style_description:e.style_description,style_keywords:e.style_keywords,banned_elements:e.banned_elements,risk_level:e.risk_level,case_no:e.case_no,filed_date:e.filed_date,notes:e.notes,createdAt:e.createdAt,images:(e.images||[]).map(function(img){return {name:img.name,url:img.url||'',elements:img.elements||[],aiDesc:img.aiDesc||''};})};});
                  saveJsonToGitHub(stripped,'cp_images_index.json').catch(function(){});
                }
              } catch(ge){}
            }

          } catch(err) {
            if(fileTimeoutId) clearTimeout(fileTimeoutId);
            pending.status = 'error';
            // Give more specific error messages
            var errMsg = err.message || String(err);
            if(errMsg === 'Failed to fetch') {
              errMsg = 'Failed to fetch：请检查 1)API Key是否已设置 2)网络是否正常 3)刷新页面重试';
            } else if(errMsg.includes('401')) {
              errMsg = 'API Key无效或已过期，请重新设置';
            } else if(errMsg.includes('429')) {
              errMsg = 'API请求过于频繁，请等待1分钟后重试';
            } else if(errMsg.includes('timeout') || errMsg.includes('超时')) {
              errMsg = '处理超时，PDF可能过大，请尝试上传页数较少的文件';
            }
            pending.error = errMsg;
          }

          if(fileTimeoutId) clearTimeout(fileTimeoutId);
          window.dispatchEvent(new Event('pdf_queue_update'));
          // Delay between files to avoid rate limiting (15s gap)
          if(!fileTimedOut) await new Promise(function(r){ setTimeout(r, 15000); });
        }
      } finally {
        PDF_PROCESSOR_RUNNING = false;
      }
    }

          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            {[['本周开发',stats.week,'📅'],['本月开发',stats.month,'📆'],['累计任务',stats.total,'📦'],['已完成',stats.done,'✅']].map(function(x){
              return <div key={x[0]} className="card" style={{textAlign:'center',padding:'14px 8px'}}>
                <div style={{fontSize:20}}>{x[2]}</div>
                <div style={{fontSize:26,fontWeight:800,color:colors.ac,margin:'4px 0'}}>{x[1]}</div>
                <div style={{fontSize:12,color:'#64748b'}}>{x[0]}</div>
              </div>;
            })}
          </div>

          {/* ── 开发提醒 ── */}
          {urgent.length>0 && <div className="card">
            <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>🔔 开发提醒</div>
            {urgent.slice(0,4).map(function(p,i){
              const bc=p.urgency>=9?'#ef4444':'#f97316';
              const bg=p.urgency>=9?'#fef2f2':'#fff7ed';
              return <div key={i} className="priority-row" style={{background:bg,borderLeftColor:bc}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>

                  <UrgBadge urgency={p.urgency} />

                </div>
              </div>;
            })}
          </div>}

          {/* ── 本周优先级 ── */}
          <div className="card">
            <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>🎯 本周优先级</div>
            {priorities.slice(0,6).map(function(p,i){
              const bc=p.urgency>=9?'#ef4444':p.urgency>=7?'#f97316':p.urgency>=5?'#3b82f6':'#10b981';
              const bg=p.urgency>=9?'#fef2f2':p.urgency>=7?'#fff7ed':p.urgency>=5?'#eff6ff':'#f0fdf4';
              return <div key={i} className="priority-row" style={{background:bg,borderLeftColor:bc}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:22}}>{p.theme.emoji}</span>
                  <div><div style={{fontWeight:600,fontSize:13}}>{p.theme.name||p.theme.en}</div>
                  <div style={{fontSize:11,color:'#64748b'}}>{p.reason}</div></div>
                </div>
                <UrgBadge urgency={p.urgency} />

            })}

        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // PAGE: RESEARCH
    // ════════════════════════════════════════════════════════════════
    function PageResearch({cat,colors}) {
      // ── 每个品类完全独立的存储key ─────────────────────────────
      const SK = 'research_v2_'+cat;
      const init = S.g(SK)||{};
      const [status,setStatus]   = useState(init.status||{});
      const [results,setResults] = useState(init.results||{});
      const [summary,setSummary] = useState(init.summary||'');
      const [lastTime,setLastTime] = useState(init.lastTime||'');
      const [running,setRunning] = useState(false);
      const [sumLoading,setSumLoading] = useState(false);
      const [sumError,setSumError] = useState('');

      function persist(ns,nr,sum) {
        const d={status:ns,results:nr,summary:sum,lastTime:new Date().toLocaleString('zh-CN')};
        S.s(SK,d); setLastTime(d.lastTime);
      }

      // ── 调研prompt(按品类区分)─────────────────────────────────
      function buildPrompt(sid) {
        const cross = (CROSS_REF[cat]||[]).slice(0,3).join('/');
        const isHome = cat==='家居';
        const catEn  = isHome ? 'home decor wall art stickers' : 'kids clothing apparel';
        if(sid===1) return {
          sys:'POD market research expert. Chinese. JSON only.',
          usr:'Search Amazon Etsy 2026 '+catEn+' POD trends. Top elements, styles, colors. JSON: {"trending_elements":[5 items],"trending_styles":[3 items],"trending_colors":[3 items],"summary":"brief"}'
        };
        if(sid===2) return {
          sys:'Amazon POD sales analyst. Chinese. JSON only.',
          usr:'Search Amazon bestsellers '+catEn+' POD. Hot elements, title patterns, market gaps. JSON: {"hot_elements":[3 items],"hot_titles":[3 items],"new_arrivals":[3 items],"market_gap":"brief","summary":"brief"}'
        };
        return {
          sys:'Cross-category POD design researcher. Chinese. JSON only.',
          usr:'Search top designs in '+cross+' for '+catEn+' POD inspiration. JSON: {"universal_elements":[3 items],"transferable_styles":[2 items],"summary":"brief"}'
        };
      }

      // ── 延迟工具 ─────────────────────────────────────────────────
      async function delay(ms){return new Promise(function(r){setTimeout(r,ms);});}

      // ── 单步执行 ─────────────────────────────────────────────────
      async function runStep(sid) {
        setStatus(function(prev){return {...prev,[sid]:'running'};});
        const pr=buildPrompt(sid);
        try {
          const raw=await callClaudeWithSearch(pr.sys,pr.usr);
          let parsed=null;
          try {
            const c=raw.replace(/```json[\s\S]*?```/g,function(m){return m.replace(/```json|```/g,'');}).replace(/```[\s\S]*?```/g,'');
            const si=c.indexOf('{'),ei=c.lastIndexOf('}');
            if(si>=0&&ei>=0){const j=JSON.parse(c.slice(si,ei+1));if(typeof j==='object'&&j!==null)parsed=j;}
          } catch(e){}
          if(!parsed){try{const m=raw.trim().match(/\{[\s\S]+\}/);if(m)parsed=JSON.parse(m[0]);}catch(e2){}}
          const result=parsed||{summary:raw.slice(0,300)};
          setResults(function(prev){
            const nr={...prev,[sid]:result};
            setStatus(function(ps){
              const nd={...ps,[sid]:'done'};
              persist(nd,nr,summary);
              return nd;
            });
            return nr;
          });
          return result;
        } catch(err) {
          const errMsg='失败：'+err.message;
          setResults(function(prev){
            const nr={...prev,[sid]:{error:errMsg}};
            setStatus(function(ps){
              const nd={...ps,[sid]:'error'};
              persist(nd,nr,summary);
              return nd;
            });
            return nr;
          });
          return null;
        }
      }

      // ── 带重试的单步执行 ─────────────────────────────────────────
      async function runStepWithRetry(sid) {
        for(let attempt=0;attempt<3;attempt++){
          const r=await runStep(sid);
          if(r&&!r.error) return r;
          const errMsg=(r&&r.error)||'';
          const isRateLimit=errMsg.indexOf('429')>=0||errMsg.indexOf('rate_limit')>=0;
          if(isRateLimit && attempt<2){
            const waitSec=attempt===0?90:150; // 90s first retry, 150s second
            for(let t=waitSec;t>0;t--){
              setStatus(function(prev){return {...prev,[sid]:'retrying('+t+'s)'};});
              await delay(1000);
            }
            setStatus(function(prev){return {...prev,[sid]:'running'};});
          } else {
            return r;
          }
        }
        return null;
      }

      // ── 生成汇总 ─────────────────────────────────────────────────
      async function genSummaryWith(res) {
        setSumLoading(true); setSumError('');
        try {
          const r1=res[1]||{},r2=res[2]||{},r3=res[3]||{};
          const sp='针对'+cat+'POD产品，根据以下调研数据给出开发建议：\n趋势元素：'
            +JSON.stringify((r1.trending_elements||[]).slice(0,4))
            +'\n热卖元素：'+JSON.stringify((r2.hot_elements||[]).slice(0,3))
            +'\n市场空白：'+(r2.market_gap||'未知')
            +'\n跨界灵感：'+JSON.stringify((r3.universal_elements||[]).slice(0,3))
            +'\n请输出(300字内)：①市场判断 ②TOP3图案方向(主题+元素+风格+配色)③安全底盘元素 ④本周行动建议';
          const sum=await callClaudeAPI(sp,'你是'+cat+' POD开发策略师，给出简洁实用建议');
          setSummary(sum);
          setResults(function(prev){persist({...status,1:'done',2:'done',3:'done'},prev,sum);return prev;});
        } catch(err){
          setSumError('汇总生成失败：'+err.message+'\n请稍后点击「重新生成」');
        }
        setSumLoading(false);
      }

      // ── 一键全部调研 ─────────────────────────────────────────────
      async function runAll() {
        setRunning(true);
        setStatus({});setResults({});setSummary('');setSumError('');
        // Mark running in localStorage so we can detect if interrupted
        S.s(SK+'_running','1');
        S.s(SK,{});
        const allR={};
        for(let i=1;i<=3;i++){
          // Check if still running (not cancelled)
          if(!S.g(SK+'_running')) break;
          const r=await runStepWithRetry(i);
          if(r&&!r.error) allR[i]=r;
          if(i<3){
            // Wait 90s between steps to avoid rate limits
            for(let t=90;t>0;t--){
              if(!S.g(SK+'_running')) break;
              setStatus(function(prev){return {...prev,['wait']:t};});
              await delay(1000);
            }
            setStatus(function(prev){const n={...prev};delete n['wait'];return n;});
          }
        }
        // 只有至少2步成功才自动生成汇总
        const successCount=Object.keys(allR).length;
        if(successCount>=2 && S.g(SK+'_running')){
          // Auto-trigger summary after 5 second delay (shorter, user sees it start)
          await delay(5000);
          if(S.g(SK+'_running')) await genSummaryWith(allR);
        }
        S.s(SK+'_running','');
        setRunning(false);
      }

      const doneCount=Object.values(status).filter(function(s){return s==='done';}).length;
      const steps=[
        {id:1,emoji:'📈',title:'市场趋势',desc:'Amazon / Etsy / Pinterest 流行元素&风格&配色'},
        {id:2,emoji:'💰',title:'销量验证',desc:'Amazon Best Sellers 热卖图案特征&市场空白'},
        {id:3,emoji:'🔀',title:'跨界借鉴',desc:(CROSS_REF[cat]||[]).slice(0,3).join('/')+' 等类目热卖灵感'}
      ];

      return (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {/* 顶部控制栏 */}
          <div className="card" style={{background:colors.grad,color:'white',border:'none',padding:'16px 20px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
              <div>
                <div style={{fontWeight:800,fontSize:17}}>📈 {cat}市场调研中心</div>
                <div style={{fontSize:12,opacity:0.85,marginTop:2}}>三方向顺序执行 · 自动限速保护 · 数据按品类独立保存</div>
                {lastTime&&<div style={{fontSize:11,opacity:0.7,marginTop:2}}>上次调研：{lastTime}</div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'flex-end'}}>
                {!running
                  ? <button onClick={runAll} style={{padding:'10px 24px',background:'white',color:colors.ac,border:'none',borderRadius:8,fontWeight:700,fontSize:13,cursor:'pointer'}}>
                      🚀 一键全部调研
                    </button>
                  : <div style={{padding:'10px 24px',background:'rgba(255,255,255,0.2)',borderRadius:8,fontSize:13,fontWeight:600}}>
                      🔄 调研进行中(约3-4分钟)...
                    </div>
                }
                {doneCount>0&&!running&&<button onClick={function(){setStatus({});setResults({});setSummary('');setSumError('');S.s(SK,{});}}
                  style={{padding:'6px 14px',background:'rgba(255,255,255,0.15)',color:'white',border:'1px solid rgba(255,255,255,0.4)',borderRadius:6,fontSize:11,cursor:'pointer'}}>
                  🔁 重新调研
                </button>}
              </div>
            </div>
            {/* 进度条 */}
            {(running||doneCount>0)&&<div style={{display:'flex',gap:6,marginTop:12}}>
              {steps.map(function(s){
                const bg=status[s.id]==='done'?'rgba(255,255,255,0.9)':status[s.id]==='running'||status[s.id]==='retrying'||(status[s.id]&&status[s.id].startsWith('retrying('))?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.2)';
                return <div key={s.id} style={{flex:1,height:4,borderRadius:4,background:bg,transition:'background 0.5s'}}></div>;
              })}
            </div>}
          </div>

          {/* 三步卡片 */}
          {steps.map(function(step){
            const st=status[step.id]; const res=results[step.id];
            const bc=st==='done'?'#10b981':st==='running'?'#8b5cf6':st==='retrying'?'#f59e0b':st==='error'?'#ef4444':'#e2e8f0';
            const hbg=st==='done'?'#f0fdf4':st==='running'?'#f5f3ff':st==='retrying'?'#fffbeb':st==='error'?'#fef2f2':'#f8fafc';
            const nb=bc; const nc=st?'white':'#94a3b8';
            const nt=st==='done'?'✓':st==='running'?'…':st==='retrying'?'⟳':st==='error'?'!':String(step.id);
            return (
              <div key={step.id} className="research-card" style={{borderColor:bc}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',background:hbg,borderRadius:'10px 10px 0 0'}}>
                  <div style={{display:'flex',alignItems:'center',gap:12,flex:1}}>
                    <div style={{width:34,height:34,borderRadius:'50%',background:nb,color:nc,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:14,flexShrink:0}}>{nt}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14}}>
                        {step.emoji} {step.title}
                        {st==='running'&&<span style={{marginLeft:8,color:'#8b5cf6',fontSize:11}}>实时搜索中...</span>}
                        {st==='retrying'&&<span style={{marginLeft:8,color:'#f59e0b',fontSize:11}}>⏳ 限速保护，等待重试...</span>}
                        {st==='done'&&<span style={{marginLeft:8,color:'#10b981',fontSize:11}}>✅ 完成</span>}
                        {st==='error'&&<span style={{marginLeft:8,color:'#ef4444',fontSize:11}}>⚠️ 失败</span>}
                      </div>
                      <div style={{fontSize:11,color:'#64748b',marginTop:2}}>{step.desc}</div>
                    </div>
                  </div>
                  {!running&&<button onClick={function(){runStepWithRetry(step.id);}}
                    style={{padding:'6px 14px',background:st==='error'?'#ef4444':st==='done'?'#64748b':colors.ac,color:'white',border:'none',borderRadius:6,fontSize:11,cursor:'pointer',flexShrink:0}}>
                    {st==='error'?'🔄 重试':st==='done'?'🔄 重新执行':'▶ 单独执行'}
                  </button>}
                </div>
                {res&&!res.error&&<div style={{padding:'12px 18px',background:'white',borderRadius:'0 0 10px 10px'}}>
                  <div style={{fontSize:12,color:'#475569',lineHeight:1.7,background:'#f8fafc',padding:'8px 12px',borderRadius:6,marginBottom:10,borderLeft:'3px solid '+bc}}>
                    💡 {res.summary||'调研完成'}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                    {step.id===1&&<>
                      <div><div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:4}}>🎨 流行元素</div>{(res.trending_elements||[]).map(function(e,i){return <div key={i} style={{fontSize:11,padding:'2px 0',color:'#374151'}}>• {e}</div>;})}</div>
                      <div><div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:4}}>🖌️ 流行风格</div>{(res.trending_styles||[]).map(function(e,i){return <div key={i} style={{fontSize:11,padding:'2px 0',color:'#374151'}}>• {e}</div>;})}</div>
                      <div><div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:4}}>🌈 流行配色</div>{(res.trending_colors||[]).map(function(e,i){return <div key={i} style={{fontSize:11,padding:'2px 0',color:'#374151'}}>• {e}</div>;})}</div>
                    </>}
                    {step.id===2&&<>
                      <div><div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:4}}>🔥 热卖元素</div>{(res.hot_elements||[]).map(function(e,i){return <div key={i} style={{fontSize:11,padding:'2px 0',color:'#374151'}}>• {e}</div>;})}</div>
                      <div><div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:4}}>💎 共同风格</div>{(res.common_styles||[]).map(function(e,i){return <div key={i} style={{fontSize:11,padding:'2px 0',color:'#374151'}}>• {e}</div>;})}</div>
                      <div><div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:4}}>🎯 市场空白</div><div style={{fontSize:11,color:'#374151'}}>{res.market_gap||'-'}</div></div>
                      {(res.hot_titles||[]).length>0&&<div style={{gridColumn:'1/4',marginTop:6,padding:'8px 10px',background:'#fef3c7',borderRadius:6}}>
                        <div style={{fontSize:10,color:'#92400e',fontWeight:700,marginBottom:4}}>📝 热卖文案套路</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{(res.hot_titles||[]).map(function(t,i){return <span key={i} style={{fontSize:11,padding:'3px 8px',background:'#fde68a',borderRadius:4,color:'#78350f'}}>&ldquo;{t}&rdquo;</span>;})}</div>
                      </div>}
                      {(res.new_arrivals||[]).length>0&&<div style={{gridColumn:'1/4',marginTop:4,padding:'8px 10px',background:'#f0fdf4',borderRadius:6}}>
                        <div style={{fontSize:10,color:'#166534',fontWeight:700,marginBottom:4}}>🆕 竞品新品趋势</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{(res.new_arrivals||[]).map(function(t,i){return <span key={i} style={{fontSize:11,padding:'3px 8px',background:'#bbf7d0',borderRadius:4,color:'#14532d'}}>• {t}</span>;})}</div>
                      </div>}
                    </>}
                    {step.id===3&&<>
                      <div style={{gridColumn:'1/3'}}><div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:4}}>🌐 通用热卖元素</div>{(res.universal_elements||[]).map(function(e,i){return <div key={i} style={{fontSize:11,padding:'2px 0',color:'#374151'}}>• {e}</div>;})}</div>
                      <div><div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:4}}>🔀 可移植风格</div>{(res.transferable_styles||[]).map(function(e,i){return <div key={i} style={{fontSize:11,padding:'2px 0',color:'#374151'}}>• {e}</div>;})}</div>
                    </>}
                  </div>
                </div>}
                {res&&res.error&&<div style={{padding:'12px 18px',background:'#fef2f2',borderRadius:'0 0 10px 10px',fontSize:12,color:'#dc2626'}}>{res.error}</div>}
              </div>
            );
          })}

          {/* AI综合报告 */}
          <div className="card">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
              <div style={{fontWeight:700,fontSize:15}}>💡 AI综合报告</div>
              <div style={{display:'flex',gap:8}}>
                {doneCount>=1&&!sumLoading&&<button onClick={function(){genSummaryWith(results);}}
                  style={{padding:'6px 14px',background:colors.ac,color:'white',border:'none',borderRadius:6,fontSize:12,cursor:'pointer'}}>
                  🔄 {summary?'重新生成':'立即生成'}
                </button>}
                {summary&&!sumLoading&&<>
                  <CopyBtn text={summary} label="📋 复制" />
                  <button onClick={function(){const blob=new Blob([summary],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=cat+'调研报告.txt';a.click();URL.revokeObjectURL(url);}}
                    style={{padding:'6px 14px',background:'#10b981',color:'white',border:'none',borderRadius:6,fontSize:12,cursor:'pointer'}}>
                    💾 下载
                  </button>
                </>}
              </div>
            </div>
            {sumLoading&&<div style={{display:'flex',alignItems:'center',gap:10,padding:16,color:'#8b5cf6'}}><Spinner /><span style={{fontSize:13}}>AI正在生成报告...</span></div>}
            {sumError&&!sumLoading&&<div style={{background:'#fef2f2',borderRadius:8,padding:12,fontSize:12,color:'#dc2626',whiteSpace:'pre-line'}}>{sumError}</div>}
            {summary&&!sumLoading&&<div style={{background:'#f8fafc',borderRadius:8,padding:14,fontSize:13,lineHeight:1.8,color:'#374151',whiteSpace:'pre-wrap'}}>{summary}</div>}

    // ════════════════════════════════════════════════════════════════
    function PageWorkflow({cat,colors,priorities,onConfirm}) {
      const SK='workflow_'+cat;
      const [step,setStep] = useState(function(){return S.g(SK+'_step')||0;});
      const [data,setData] = useState(function(){return S.g(SK)||{};});
      const [showTrendImport,setShowTrendImport] = useState(function(){
        return Object.keys(S.g(SK)||{}).length===0;
      });
      function upd(k,v){setData(function(prev){const next={...prev,[k]:v};S.s(SK,next);return next;});}
      function goStep(n){setStep(n);S.s(SK+'_step',n);}
      const stepDefs=['产品线','开发方向','方向验证','元素融合','生成提示词','生图筛选','Listing文案'];
      function handleConfirm(task){S.s(SK,{});S.s(SK+'_step',0);setData({});goStep(0);onConfirm(task);}
      function resetAll(){
        if(!window.confirm('清除当前所有进度，重新开始？')) return;
        S.s(SK,{});S.s(SK+'_step',0);setData({});goStep(0);setShowTrendImport(true);
      }
      const hasHistory = Object.keys(S.g(SK)||{}).length > 0;
      const research = S.g('research_'+cat)||{};
      const Comps=[WFStep0,WFStep1,WFStep2b,WFStep2,WFStep3,WFStep3b,WFStep4];
      const Comp=Comps[step];
      return (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="card" style={{padding:'12px 20px'}}>
            {/* 顶部：进度提示 + 新方案按钮 */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              {showTrendImport
                ? <div style={{fontSize:12,color:colors.ac,fontWeight:600}}>📡 趋势导入</div>
                : hasHistory && step===0
                  ? <div style={{fontSize:12,color:'#f59e0b',fontWeight:600}}>⚠️ 检测到上次未完成的方案</div>
                  : <div style={{fontSize:12,color:'#94a3b8'}}>开发流程 · {MONTHLY_CALENDAR[new Date().getMonth()+1]&&MONTHLY_CALENDAR[new Date().getMonth()+1].theme}</div>}
              <div style={{display:'flex',gap:6}}>
                {!showTrendImport&&<button onClick={function(){setShowTrendImport(true);}}
                  style={{padding:'5px 12px',background:'#eff6ff',color:'#3b82f6',border:'none',
                    borderRadius:6,fontSize:11,fontWeight:700,cursor:'pointer'}}>
                  📡 趋势
                </button>}
                <button onClick={resetAll}
                  style={{padding:'5px 14px',background:'#fee2e2',color:'#dc2626',border:'none',
                    borderRadius:6,fontSize:12,fontWeight:700,cursor:'pointer'}}>
                  🗑 清除重来
                </button>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',overflowX:'auto',gap:0}}>
              {stepDefs.map(function(label,i){
                const done=i<step;const active=i===step;
                const dotBg=done?colors.ac:active?'white':'#e2e8f0';
                const dotC=done?'white':active?colors.ac:'#94a3b8';
                const dotBorder=active?'2px solid '+colors.ac:'none';
                return <div key={i} style={{display:'flex',alignItems:'center'}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',cursor:i<=step?'pointer':'default'}}
                    onClick={function(){
                      if(i===step) return;
                      // 检查前置数据是否完整，给出提示但允许跳转
                      var warn='';
                      if(i>=1&&!data.ageGroup&&cat==='童装') warn='⚠️ 未选择年龄段，部分功能可能不完整';
                      if(i>=2&&!data.theme) warn='⚠️ 未选择主题，元素融合可能不准确';
                      if(i>=3&&!(data.selectedCombos&&data.selectedCombos.length)) warn='⚠️ 未选择元素方案，提示词可能为空';
                      if(i>=4&&!(data.mjPrompts&&Object.keys(data.mjPrompts).length)) warn='⚠️ 未生成MJ咒语，生图步骤需要先生成咒语';
                      if(warn){
                        if(!window.confirm(warn+'\n\n是否仍要跳转到该步骤？')) return;
                      }
                      goStep(i);
                    }}>
                    <div className="step-dot" style={{background:dotBg,color:dotC,border:dotBorder}}>{done?'✓':i+1}</div>
                    <div style={{fontSize:10,marginTop:4,color:active?colors.ac:'#94a3b8',fontWeight:active?700:400,whiteSpace:'nowrap'}}>{label}</div>
                  </div>
                  {i<stepDefs.length-1&&<div style={{width:24,height:2,background:done?colors.ac:'#e2e8f0',margin:'0 2px',marginBottom:16}}></div>}
                </div>;
              })}
            </div>
          </div>
          <div className="card">
            {showTrendImport
              ? <TrendImportStep colors={colors} cat={cat} onDone={function(trendData){
                  if(trendData) upd('weekTrend',trendData);
                  setShowTrendImport(false);
                }} />
              : <Comp data={data} upd={upd} cat={cat} colors={colors} priorities={priorities} research={research}
                  onNext={function(){var ns=Math.min(step+1,6);goStep(ns);}}
                  onBack={function(){var ns=Math.max(step-1,0);goStep(ns);}}
                  onConfirm={handleConfirm} />
            }
          </div>
        </div>
      );
    }

    function WFStep2({data,upd,cat,colors,research,onNext,onBack}) {
      const [combos,setCombos] = useState(data.elementCombos||[]);

      const [selected,setSelected] = useState(data.selectedCombos||[]);
      const [customInput,setCustomInput] = useState(data.customElements||'');
      const theme=data.theme||{};
      const themeKey=theme.name||theme.en||'';
      const themeElems=THEME_ELEMENTS[themeKey]||{hot:[],avoid:[]};
      const rs=(research.results)||{};
      const r1=rs[1]||{};const r2=rs[2]||{};const r3=rs[3]||{};

      async function gen() {
        setLoading(true);
        const ageInfo=cat==='家居'
          ?'适用空间：'+(data.rooms||[]).join('、')+'，氛围：'+(data.homeAtm||[]).join('、')
          :'年龄：'+(data.ageGroup||'toddler')+'，性别：'+(data.gender||'通用')+'，场景：'+(data.scenes||[]).join('、');
        const isCustomTheme = !!(data.theme&&(data.theme.isCustom||data.theme.isAISuggested||data.theme.isEvergreen||data.theme.type==='combined'));
        const aiTheme = data.theme&&data.theme.isAISuggested;
        const isCombined = data.theme&&data.theme.type==='combined';
        const isEvergreen = data.theme&&data.theme.isEvergreen&&!isCombined;
        const weekTrend = data.weekTrend||null;
        const trendCtx = weekTrend
          ?'【本周Reddit趋势情绪】'+(weekTrend.emotions||[]).join('、')+'；热门短句：'+(weekTrend.hot_phrases||[]).slice(0,2).join('、')
          :'';
        const emotionCtx = (data.theme&&data.theme.emotion)||data.customEmotion||'';
        // 风格：优先用验证报告推荐，其次AI推导选的，最后自动匹配
        const validated = data.validationExtracted||{};
        const styleCtx = validated.recommended_style||(data.theme&&data.theme.style)||data.customStyle
          ||matchStyle(emotionCtx, themeKey, data.gender, data.ageGroup, data.theme&&data.theme.holiday);
        const styleInfo = VISUAL_STYLES[styleCtx]||{};
        // 验证数据上下文
        const validationCtx = validated.competitor_elements
          ?'【竞品高频元素（来自市场验证）】'+(validated.competitor_elements||[]).join('、')+'\n'
           +'【买家搜索关键词】'+(validated.buyer_keywords||[]).join('、')+'\n'
           +'【差异化方向】'+(validated.diff_directions||[]).join('、')+'\n'
           +(validated.price_range?'【竞品定价】'+validated.price_range+'\n':'')
          :'';
        const parts=[
          '你是'+cat+' POD爆款图案设计专家。主干：妈妈文化(Mom Culture)',
          '产品线：'+(data.theme&&data.theme.line||'Identity')+' | 目标：'+themeKey+'主题，'+cat+'品类，'+ageInfo,
          '【确定视觉风格】'+styleCtx+'（'+(styleInfo.desc||'')+' | 配色：'+(styleInfo.colorHint||'')+' | 视觉：'+(styleInfo.visual||'')+'）',
          validationCtx,
          isCombined
            ?'【叠加开发主题】常青主题：'+(data.theme.evergreens||[]).join('+')+'，叠加节日：'+((data.theme.holiday&&(data.theme.holiday.name||data.theme.holiday.en))||'')+'。请将常青主题元素与节日氛围融合，生成兼顾常青销售力和节日限定感的图案方案。'
            :aiTheme
              ?'【AI推导方向】产品线：'+(data.theme.line||'')+(data.theme.sub?' | 子分类：'+data.theme.sub:'')+' | 情绪：'+(data.theme.emotion||'')+' | 风格：'+(data.theme.style||'')+' | 主题节点：'+(data.theme.themeNode||'')
              :isEvergreen
                ?'【常青主题】"'+themeKey+'"，面向'+(data.gender==='girl'?'女童':data.gender==='boy'?'男童':'通用')+' '+(data.ageGroup||'')+'岁。请基于此常青主题生成多样化的图案元素方案。'
                :isCustomTheme
                  ?'【自定义主题】"'+themeKey+'"，请深入理解文化内涵、目标受众、视觉特征，自由发挥。'
                  :'【主题热卖元素】'+JSON.stringify(themeElems.hot)+'，避免：'+JSON.stringify(themeElems.avoid),
          emotionCtx?'【指定情绪方向】'+emotionCtx:'',
          styleCtx?'【指定视觉风格】'+styleCtx+' —— 请围绕此风格生成元素方案':'',
          trendCtx,
          '【市调流行元素】'+JSON.stringify(r1.trending_elements||[]),
          '【市调流行风格】'+JSON.stringify(r1.trending_styles||[]),
          '【市调流行配色】'+JSON.stringify(r1.trending_colors||[]),
          '【Amazon热卖元素】'+JSON.stringify(r2.hot_elements||[]),
          '【Amazon热卖文案】'+JSON.stringify(r2.hot_titles||[]),
          '【竞品新品方向】'+JSON.stringify(r2.new_arrivals||[]),
          '【跨界通用元素】'+JSON.stringify(r3.universal_elements||[]),
          customInput?'【用户额外要求(请翻译成英文融入方案)】'+customInput:'',
          '【版权禁用元素-绝对不能出现】'+JSON.stringify(getCpBanList().banned.slice(0,20)),
          '【版权禁用风格-绝对不能使用】'+JSON.stringify(getCpBanList().styleKws.slice(0,10)),
          'Formula: trending style + trending color + trending elements + theme hot elements = hit pattern. Generate 4 combos, 40% core + 30% trend + 30% connecting elements, max 6 colors, 100% original. STRICTLY avoid all banned elements and styles listed above.',
          'Output JSON array ONLY (no markdown, no explanation): [{"name":"English name","nameCN":"中文名","core_elements":["English element"],"trend_elements":["English element"],"connect_elements":["English element"],"style":"English style","colors":["#hex1","#hex2","#hex3"],"market_fit":"reason","formula_note":"how formula applied"}]'
        ];
        try {
          if(customInput) upd('customElements',customInput);
          const raw=await callClaudeAPI(parts.join(' '),'You are a '+cat+' POD design expert. Output JSON array ONLY in English.');
          const c=raw.replace(/```json|```/g,'').trim();
          const si=c.indexOf('['),ei=c.lastIndexOf(']');
          if(si>=0&&ei>=0){
            const p=JSON.parse(c.slice(si,ei+1));
            // Post-check: REMOVE banned elements from combos (hard block, not just warn)
            const banList=getCpBanList().banned.map(function(b){return b.toLowerCase();});
            function isBanned(el){
              return banList.some(function(b){return b.length>1 && el.toLowerCase().indexOf(b)>=0;});
            }
            const checkedP=p.map(function(combo){
              const cleanCore=(combo.core_elements||[]).filter(function(el){return !isBanned(el);});
              const cleanTrend=(combo.trend_elements||[]).filter(function(el){return !isBanned(el);});
              const cleanConn=(combo.connect_elements||[]).filter(function(el){return !isBanned(el);});
              const removed=(combo.core_elements||[]).concat(combo.trend_elements||[]).concat(combo.connect_elements||[]).filter(isBanned);
              return {...combo,core_elements:cleanCore,trend_elements:cleanTrend,connect_elements:cleanConn,
                _removedBanned:removed.length>0?removed:[]};
            });
            // Alert if any were removed
            const totalRemoved=checkedP.reduce(function(s,c){return s+(c._removedBanned||[]).length;},0);
            if(totalRemoved>0) alert('⚠️ 已自动移除 '+totalRemoved+' 个侵权元素，方案已净化');
            setCombos(checkedP);upd('elementCombos',checkedP);setCustomInput('');
          }
          else alert('AI格式错误，请重试');
        }catch(err){alert('生成失败：'+err.message);}
        setLoading(false);
      }

        <div style={{fontWeight:800,fontSize:18,color:colors.ac}}>Step 3 — 元素融合设计</div>
        <div style={{padding:'12px 16px',borderRadius:10,background:colors.ac+'10',border:'1px solid '+colors.ac+'30'}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>📊 市调数据(自动读取)</div>
          {hasResearch?<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,fontSize:11}}>
            {[['流行元素',r1.trending_elements||[],'🔑'],['流行风格',r1.trending_styles||[],'🎨'],['流行配色',r1.trending_colors||[],'🌈']].map(function(x){
              return <div key={x[0]}><div style={{color:'#64748b',fontWeight:600,marginBottom:4}}>{x[2]} {x[0]}</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:3}}>{x[1].slice(0,3).map(function(e,i){return <span key={i} className="tag" style={{background:colors.ac+'20',color:colors.ac,fontSize:10}}>{e}</span>;})}{x[1].length===0&&<span style={{color:'#94a3b8'}}>无数据</span>}</div></div>;
            })}
          </div>:<div style={{fontSize:12,color:'#64748b'}}>⚠️ 建议先完成「市场调研」获得更精准方案</div>}
          <div style={{marginTop:8,fontSize:11,color:'#64748b'}}>🎯 主题热卖元素库：<span style={{color:colors.ac}}>{themeElems.hot.slice(0,5).join('、')||'通用'}</span></div>
        </div>
        <div style={{padding:'10px 14px',borderRadius:8,background:'#fef3c7',border:'1px solid #fde68a',fontSize:12}}>
          <strong>💡 融合公式：</strong>流行风格 + 流行配色 + 流行元素 + 主题热卖元素 = 爆款图案
        </div>
        {(r2.hot_titles||[]).length>0&&<div style={{padding:'10px 14px',borderRadius:8,background:'#fef9c3',border:'1px solid #fde68a'}}>
          <div style={{fontWeight:700,fontSize:12,color:'#92400e',marginBottom:6}}>📝 热卖文案套路(融合参考)</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>{(r2.hot_titles||[]).map(function(t,i){return <span key={i} style={{padding:'3px 8px',background:'#fde68a',borderRadius:4,color:'#78350f',fontSize:11}}>{t}</span>;})}</div>
        </div>}
        <div style={{background:'#f8fafc',borderRadius:10,padding:14,border:'1px solid #e2e8f0'}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:6,color:'#374151'}}>✏️ 自定义开发要求(选填)</div>
          <textarea value={customInput} onChange={function(e){setCustomInput(e.target.value);}}
            placeholder="可输入额外要求，例如：加入星星元素、要卡通可爱风、结合母亲节文案方向...(支持中文，AI会自动翻译融合)"
            style={{width:'100%',minHeight:72,padding:'8px 12px',borderRadius:8,border:'1px solid #d1d5db',fontSize:12,outline:'none',resize:'vertical',boxSizing:'border-box'}} />
          <div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>💡 生成后自动清空，再次生成可重新填写</div>
        </div>
        <button className="btn" onClick={gen} disabled={loading} style={{background:colors.ac,color:'white',width:'100%',padding:'12px',fontSize:14,opacity:loading?0.5:1}}>
          {loading?'🔄 AI生成融合方案中...':'🤖 AI生成元素融合方案'}
        </button>
        {loading&&<Spinner />}
        {combos.length>0&&<div>
          <div style={{fontSize:13,color:'#64748b',marginBottom:8}}>选择要开发的方案(可多选)：</div>
          {combos.map(function(c,i){
            const isSel=!!selected.find(function(x){return x.name===c.name;});
            return <div key={i} className="combo-card" onClick={function(){toggleSel(c);}}
              style={isSel?{borderColor:colors.ac,background:colors.ac+'08'}:{}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
                <input type="checkbox" checked={isSel} onChange={function(){toggleSel(c);}} style={{width:18,height:18,marginTop:2,flexShrink:0}} />
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,color:colors.ac}}>{c.name}</div>
                  {c._cpWarning&&<div style={{fontSize:11,padding:'4px 10px',background:'#fee2e2',borderRadius:5,color:'#dc2626',marginTop:3}}>⚠️ 版权预警：{c._cpWarning}</div>}
                  <div style={{fontSize:12,color:'#64748b',marginBottom:6}}>{c.nameCN} · {c.style}</div>
                  {c.formula_note&&<div style={{fontSize:11,padding:'6px 10px',background:colors.ac+'12',borderRadius:6,marginBottom:8,color:colors.ac}}>✨ {c.formula_note}</div>}
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,fontSize:11}}>
                    {[['🔵 常规',c.core_elements,'#2563eb'],['🟣 流行',c.trend_elements,'#7c3aed'],['⚪ 连接',c.connect_elements,'#64748b']].map(function(row){
                      return <div key={row[0]}><div style={{fontWeight:600,color:row[2],marginBottom:3}}>{row[0]}</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:3}}>{(row[1]||[]).map(function(e,j){return <span key={j} className="tag" style={{background:row[2]+'15',color:row[2],fontSize:10}}>{e}</span>;})}</div></div>;
                    })}
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:8}}>{(c.colors||[]).map(function(cl,j){return <span key={j} className="tag" style={{background:'#f1f5f9',color:'#475569',fontSize:10}}>🎨 {cl}</span>;})}</div>
                  {c.market_fit&&<div style={{marginTop:8,fontSize:11,padding:'6px 10px',background:'#f8fafc',borderRadius:6,color:'#475569'}}>💡 {c.market_fit}</div>}
                </div>
              </div>
            </div>;
          })}
          {selected.length>0&&<button className="btn" onClick={function(){upd('selectedCombos',selected);onNext();}}
            style={{background:colors.ac,color:'white',width:'100%',padding:'12px',marginTop:8}}>
            已选 {selected.length} 个方案，生成MJ咒语 →
          </button>}
        </div>}
        <button className="btn" onClick={onBack} style={{background:'#f1f5f9',color:'#475569',width:'100%'}}>← 上一步</button>
      </div>;
    }

    // 家居品类规格配置
    const HOME_CAT_SPECS = {
      '水晶贴':    {seamless:false, ar:'1:1',   arFlag:'--ar 1:1'},
      '门盖':      {seamless:false, ar:'9:16',  arFlag:'--ar 9:16'},
      '门贴':      {seamless:false, ar:'9:16',  arFlag:'--ar 9:16'},
      '窗户贴':    {seamless:false, ar:'3:2',   arFlag:'--ar 3:2'},
      '楼梯贴':    {seamless:false, ar:'9:50',  arFlag:'--ar 9:50'},
      '横幅':      {seamless:false, ar:'16:9',  arFlag:'--ar 16:9'},
    };
    function getHomeCatSpec(subcat) {
      return HOME_CAT_SPECS[subcat] || {seamless:true, ar:'1:1', arFlag:'--ar 1:1 --tile'};
    }

    function WFStep3({data,upd,cat,colors,onNext,onBack}) {
      const [prompts,setPrompts] = useState(data.mjPrompts||{});
      const [loading,setLoading] = useState(false);
      const [homeSubcat,setHomeSubcat] = useState(data.homeSubcat||'');
      const [mjCustom,setMjCustom] = useState('');
      const combos=data.selectedCombos||[];
      const theme=data.theme||{};
      const isHome=cat==='家居';
      const homeCatList=['水晶贴','门盖','门贴','窗户贴','楼梯贴','烫衣板罩(标准)','烫衣板罩(小型)','可折叠熨衣垫','门挂熨衣垫','圆形桌套','窗幔','静电窗膜','横幅'];
      const homeCatEN={'水晶贴':'Crystal Sticker','门盖':'Door Cover','门贴':'Door Sticker','窗户贴':'Window Sticker','楼梯贴':'Stair Sticker','烫衣板罩(标准)':'Ironing Board Cover Standard','烫衣板罩(小型)':'Ironing Board Cover Small','可折叠熨衣垫':'Foldable Ironing Mat','门挂熨衣垫':'Door Hang Ironing Pad','圆形桌套':'Round Table Cover','窗幔':'Window Valance','静电窗膜':'Static Window Film','横幅':'Banner Backdrop'};

      // 10种差异化风格修饰词
      const STYLE_MODS = [
        'flat vector illustration, bold outlines, vibrant colors',
        'watercolor painting style, soft edges, dreamy atmosphere',
        'retro vintage 70s poster art, warm earthy tones, textured',
        'minimalist line art, clean simple strokes, modern aesthetic',
        'whimsical cartoon style, playful exaggerated forms, bright palette',
        'folk art pattern, hand-crafted feel, decorative motifs',
        'geometric abstract, sharp angles, bold color blocking',
        'cute kawaii style, soft pastel colors, rounded shapes',
        'boho botanical illustration, organic shapes, muted natural tones',
        'pop art style, high contrast, bold graphic impact'
      ];

      async function translateCustom(text) {
        if(!text || text.trim()==='') return '';
        // Check if already English (rough check)
        const hasChineseChars = /[一-鿿]/.test(text);
        if(!hasChineseChars) return text;
        try {
          const r = await callClaudeAPI('Translate this to English concisely for use in a Midjourney prompt. Output translation ONLY, no explanation: '+text, 'You are a translator. Output English translation only.');
          return r.trim();
        } catch(e) { return text; }
      }

      async function gen() {
        if(isHome && !homeSubcat) { alert('请先选择品类'); return; }
        setLoading(true);
        const customEn = await translateCustom(mjCustom);
        const ag=data.ageGroup||'toddler';const gd=data.gender||'unisex';
        const ageCfg={
          newborn:{sty:180,size:'extra large centered design, 40% whitespace',ar:'--ar 1:1'},
          toddler:{sty:160,size:'large centered design, 30% whitespace',ar:'--ar 1:1'},
          kids:{sty:150,size:'bold medium design, 25% whitespace',ar:'--ar 1:1'},
          youth:{sty:140,size:'dynamic design, 20% whitespace',ar:'--ar 1:1'}
        };
        const spec=isHome?getHomeCatSpec(homeSubcat):null;
        const agCfg=isHome?{sty:200,ar:spec?spec.arFlag:'--ar 1:1'}:(ageCfg[ag]||ageCfg.toddler);
        const gMod=isHome?'':(gd==='boy'?'boys':(gd==='girl'?'girls':'kids'));
        const homeCatEnName=homeCatEN[homeSubcat]||homeSubcat;
        const productCtx=isHome
          ?(homeCatEnName+' '+(theme.en||theme.name||'')).trim()
          :(ag==='newborn'?'newborn':ag==='toddler'?'toddler':ag==='kids'?'kids':'youth')+' '+gMod+' apparel';
        const allP={};

        // Generate for each combo using AI for creative, varied prompts
        for(let ci=0;ci<combos.length;ci++){
          const combo=combos[ci];
          // Final ban check - hard block
          const _bans=getCpBanList().banned.map(function(b){return b.toLowerCase();});
          function _isBanned(el){return _bans.some(function(b){return b.length>1&&el.toLowerCase().indexOf(b)>=0;});}
          const core=(combo.core_elements||[]).filter(function(el){return !_isBanned(el);});
          const trend=(combo.trend_elements||[]).filter(function(el){return !_isBanned(el);});
          const conn=(combo.connect_elements||[]).filter(function(el){return !_isBanned(el);});
          const colorStr=(combo.colors||[]).slice(0,3).join(', ')||'soft pastel colors';
          const customNote=customEn?'\nExtra requirement: '+customEn:'';
          const seamlessSpec=isHome?(spec&&spec.seamless?'seamless repeating pattern, tileable':'single centered composition on clean background'):'';

          var _tailFlag = isHome ? agCfg.ar+' --s '+agCfg.sty : agCfg.ar+' --s '+agCfg.sty;
          var _p1to5spec = isHome
            ? (spec&&spec.seamless ? 'seamless repeating pattern, tileable, surface design' : 'single centered composition, product design')
            : 'TEXT + GRAPHIC combination (non-seamless). MUST include bold readable text/slogan/quote as the main visual element, combined with graphic illustration elements. White background, print-ready for T-shirt. NO --tile. The text should be the hero element.';
          var _p6to10spec = isHome
            ? 'single centered composition, product design, different style angle'
            : 'seamless repeating pattern, tileable surface design, --tile. Pure graphic elements ONLY - absolutely NO text or words. Dense repeating pattern suitable for fabric/background printing.';

          const aiPrompt=
            'You are a professional Midjourney prompt writer for POD (print-on-demand) products.\n'
            +'Your job is to write prompts that produce BEAUTIFUL, SELLABLE images - not keyword lists.\n\n'

            +'PRODUCT CONTEXT:\n'
            +'- Product: '+productCtx+(isHome?' / '+homeCatEnName:'')+' print design\n'
            +'- Theme: '+(combo.nameCN||combo.name||'')+'\n'
            +'- Design elements to work with: '+[...core,...trend,...conn].join(', ')+'\n'
            +'- Color mood: '+colorStr+'\n'
            +(customNote?'- Extra requirement: '+customNote+'\n':'')

            +'\nTHE GOLDEN RULE - NEVER DO THIS:\n'
            +'BAD: "flowers, butterflies, #FF69B4, #87CEEB, pop art style"\n'
            +'This is just a keyword list. Midjourney needs to know WHAT THE IMAGE LOOKS LIKE.\n\n'

            +'ALWAYS DO THIS INSTEAD - describe a real visual scene:\n'
            +'GOOD: "a single oversized peony in full bloom, a delicate butterfly resting on its petal, soft blush pink petals catching warm light, pale sky blue background, bold graphic outlines, high contrast illustration"\n'
            +'GOOD: "dense scattered wildflowers and dancing butterflies forming a repeating surface pattern, cotton candy pink and powder blue palette, clean flat vector shapes, playful and airy"\n\n'

            +'HOW TO WRITE GREAT MJ PROMPTS:\n'
            +'1. Paint a picture: describe what you SEE, not what things ARE\n'
            +'2. Describe composition: is the subject centered? floating? clustered? scattered? diagonal?\n'
            +'3. Describe light and mood: warm golden light / soft diffused glow / clean bright studio / dreamy haze\n'
            +'4. Describe colors evocatively: "dusty mauve" not "purple", "butter yellow" not "yellow", "sage green" not "green"\n'
            +'5. Describe art style with texture: "loose watercolor washes with visible brushstrokes" not just "watercolor"\n'
            +'6. Each of the 10 prompts must feel like a COMPLETELY DIFFERENT visual concept\n\n'

            +'GENERATE 10 PROMPTS:\n'
            +'Prompts 1-5 (TEXT+GRAPHIC, non-seamless): '+_p1to5spec+'\n'
            +'Prompts 6-10 (SEAMLESS PATTERN, no text): '+_p6to10spec+'\n'
            +'Each prompt ends with: '+_tailFlag+'\n'
            +'Each prompt starts with: /imagine prompt:\n'
            +'For prompts 1-5: vary the text style (bold script/vintage block/hand-lettered/serif/brush), text layout (arched/stacked/diagonal/centered), and graphic element combination\n'
            +'For prompts 6-10: vary pattern density (dense/scattered/geometric), element scale, and pattern arrangement. Ends with --tile\n'
            +'NO hex color codes in prompts - describe colors in words\n'
            +'NO banned or trademarked content\n\n'

            +'Output ONLY the 10 /imagine prompts, one per line, no numbering, no explanation.';

          try {
            const raw=await callClaudeAPI(aiPrompt,'Midjourney prompt expert. Output prompts only, one per line.');
            const _bansRaw = getCpBanList().banned.map(function(b){return b.toLowerCase();});
            function _wordMatch(hay, needle) {
              if(!needle||needle.length<2) return false;
              const esc = needle.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
              return new RegExp('(?<![a-z0-9])'+esc+'(?![a-z0-9])','i').test(hay);
            }
            const lines=raw.split('\n').map(function(l){return l.trim();})
              .filter(function(l){
                if(!l.startsWith('/imagine')) return false;
                const lLow = l.toLowerCase();
                return !_bansRaw.some(function(b){return b.length>1&&_wordMatch(lLow,b);});
              });
            if(lines.length>=3){
              allP[combo.name]=lines.slice(0,10);
            } else {
              // Fallback: manual construction if AI fails
              const all=[...core,...trend,...conn];
              const ps=[];
              for(let i=0;i<10;i++){
                const el=all[i%all.length]||core[0]||'';
                const style=STYLE_MODS[i%STYLE_MODS.length];
                const isSml=isHome?(spec&&spec.seamless):(i>=5);
                const mod=isHome
                  ?(isSml?'seamless repeating pattern, tileable':'single centered composition, isolated on white')
                  :(i<5
                    ?'text and graphic combination, bold readable slogan with '+el+' illustration, white background, print-ready'
                    :'seamless repeating pattern, tileable, NO text, pure '+el+' graphic elements --tile');
                const candidate='/imagine prompt: '+el+', '+style+', '+mod+', '+colorStr+' '+agCfg.ar+' --s '+agCfg.sty;
                const cLow=candidate.toLowerCase();
                const hasBan=getCpBanList().banned.some(function(b){
                  if(!b||b.length<2) return false;
                  const esc=b.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
                  return new RegExp('(?<![a-z0-9])'+esc+'(?![a-z0-9])','i').test(cLow);
                });
                if(!hasBan) ps.push(candidate);
              }
              allP[combo.name]=ps;
            }
          } catch(e) {
            console.warn('AI prompt gen failed for '+combo.name+':',e.message);
            allP[combo.name]=['生成失败，请重试'];
          }

          // Delay between combos to avoid rate limits
          if(ci<combos.length-1) await new Promise(function(r){setTimeout(r,3000);});
        }

        setPrompts(allP);upd('mjPrompts',allP);upd('homeSubcat',homeSubcat);
        setMjCustom('');
        setLoading(false);
      }

      const specInfo=isHome&&homeSubcat?getHomeCatSpec(homeSubcat):null;

      return <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div style={{fontWeight:800,fontSize:18,color:colors.ac}}>Step 4 — 生成MJ咒语</div>
        {isHome && <div style={{background:'#f8fafc',borderRadius:10,padding:14,border:'2px solid '+(homeSubcat?colors.ac:'#e2e8f0')}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:'#374151'}}>📦 第一步：选择开发品类</div>
          <select value={homeSubcat} onChange={function(e){setHomeSubcat(e.target.value);setPrompts({});}}
            style={{width:'100%',padding:'9px 12px',borderRadius:8,border:'1px solid #d1d5db',fontSize:13,outline:'none',background:'white'}}>
            <option value=''>-- 请选择品类 --</option>
            {homeCatList.map(function(c){return <option key={c} value={c}>{c}</option>;})}
          </select>
          {specInfo && <div style={{marginTop:10,display:'flex',gap:8,flexWrap:'wrap'}}>
            <span style={{padding:'4px 12px',borderRadius:20,background:specInfo.seamless?'#dcfce7':'#dbeafe',color:specInfo.seamless?'#15803d':'#1d4ed8',fontSize:11,fontWeight:700}}>
              {specInfo.seamless?'🔲 无缝图 --tile':'🖼️ 非无缝图'}
            </span>
            <span style={{padding:'4px 12px',borderRadius:20,background:'#fef9c3',color:'#854d0e',fontSize:11,fontWeight:700}}>
              📐 比例 {specInfo.ar}
            </span>
            <span style={{padding:'4px 12px',borderRadius:20,background:'#f3f4f6',color:'#374151',fontSize:11,fontWeight:700}}>
              ✅ 10条统一规格
            </span>
          </div>}
        </div>}
        {!isHome && <div style={{fontSize:13,color:'#64748b'}}>每个方案10条：前5条「文字+图案」组合（T恤印花），后5条「纯图案无缝」（面料/背景）</div>}
        <div style={{background:'#f8fafc',borderRadius:10,padding:14,border:'1px solid #e2e8f0'}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:6,color:'#374151'}}>✏️ 自定义咒语要求(选填)</div>
          <textarea value={mjCustom} onChange={function(e){setMjCustom(e.target.value);}}
            placeholder="可输入额外要求，例如：要有宇航员形象、加彩虹元素、圣诞节风格...(支持中文，自动翻译成英文)"
            style={{width:'100%',minHeight:60,padding:'8px 12px',borderRadius:8,border:'1px solid #d1d5db',fontSize:12,outline:'none',resize:'vertical',boxSizing:'border-box'}} />
          <div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>💡 中文会自动翻译成英文融入咒语，生成完自动清空</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn" onClick={gen} disabled={loading||(isHome&&!homeSubcat)}
            style={{background:(isHome&&!homeSubcat)?'#cbd5e1':colors.ac,color:'white',flex:1}}>
            {loading?'🔄 生成中...':'🎨 生成MJ咒语(10条/方案)'}
          </button>
          {Object.keys(prompts).length>0&&!loading&&<button className="btn" onClick={function(){setPrompts({});upd('mjPrompts',{});}} style={{background:'#fee2e2',color:'#dc2626'}}>🗑️ 清除</button>}
        </div>
        {Object.entries(prompts).map(function(entry){
          const pName=entry[0];const list=entry[1];
          return <div key={pName} style={{border:'2px solid '+colors.ac+'50',borderRadius:12,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:colors.ac+'15'}}>
              <div style={{fontWeight:700,fontSize:15,color:colors.ac}}>{pName}</div>
              <CopyBtn text={list.join('\n\n')} label="📋 复制全部10条" />
            </div>
            <div style={{padding:12,background:'white',display:'flex',flexDirection:'column',gap:8}}>
              <div style={{fontSize:11,padding:'6px 10px',background:'#f8fafc',borderRadius:6,color:'#64748b'}}>
                {isHome&&specInfo?(specInfo.seamless?'🔲 无缝图':'🖼️ 非无缝图')+' · '+specInfo.ar+' · 共'+list.length+'条':'共'+list.length+'条咒语'}
              </div>
              {null /* 侵权词已在生成阶段直接过滤，不展示警告 */}
              {list.map(function(p,i){
                return <div key={i} className="code-block">
                  <div style={{color:'#94a3b8',fontSize:10,marginBottom:4}}>#{i+1} {isHome?(specInfo&&specInfo.seamless?'🔲 无缝图':'🖼️ 非无缝图'):(i<5?'✍️ 文字+图案':'🔲 无缝图案')}</div>
                  <div style={{paddingRight:50}}>{p}</div>
                  <CopyBtnAbs text={p} />
                </div>;
              })}
            </div>
          </div>;
        })}
        {Object.keys(prompts).length>0&&<button className="btn" onClick={onNext} style={{background:colors.ac,color:'white',width:'100%'}}>下一步 →</button>}
        <button className="btn" onClick={onBack} style={{background:'#f1f5f9',color:'#475569',width:'100%'}}>← 上一步</button>
      </div>;
    }


    // ── Ideogram API helpers ─────────────────────────────────────────
    const getIdeogramKey = function() { return localStorage.getItem('ideogram_api_key')||''; };
    const getPodWorkerUrl = function() { return localStorage.getItem('pod_worker_url')||''; };

    async function ideogramGenerate(prompt, isSeamless, aspectRatio, modelVer) {
      const key = localStorage.getItem('ideogram_api_key')||'';
      if(!key) throw new Error('请先设置 Ideogram API Key');
      const workerUrl = localStorage.getItem('pod_worker_url')||'';
      if(!workerUrl) throw new Error('请先设置 Worker URL');
      const ar = aspectRatio || '1x1';
      // 服装POD统一用DESIGN风格：白底、扁平、印刷适配
      // 无缝图加 seamless tile 提示到prompt里，Ideogram V3不支持--tile参数
      const fullPrompt = isSeamless
        ? prompt + ', seamless repeating pattern, tileable surface design, clean white background, flat vector illustration, print-ready'
