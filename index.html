
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POD开发工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .container {
    text-align: center;
    padding: 40px 20px;
  }
  .title {
    color: white;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    color: rgba(255,255,255,0.75);
    font-size: 14px;
    margin-bottom: 48px;
  }
  .cards {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 36px;
    width: 260px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 28px 70px rgba(0,0,0,0.3);
  }
  .card-emoji {
    font-size: 56px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 20px;
    font-weight: 800;
    color: #1e293b;
    margin-bottom: 8px;
  }
  .card-sub {
    font-size: 13px;
    color: #64748b;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .card-btn {
    display: inline-block;
    padding: 10px 24px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    color: white;
  }
  .card-kids .card-btn { background: #8b5cf6; }
  .card-home .card-btn { background: #10b981; }
  .card-kids { border-top: 4px solid #8b5cf6; }
  .card-home { border-top: 4px solid #10b981; }
  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .tag-kids { background: #f3f0ff; color: #8b5cf6; }
  .tag-home { background: #ecfdf5; color: #10b981; }
  .footer {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    margin-top: 48px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title">🛠 POD 开发工具</div>
  <div class="subtitle">选择要开发的品类，开始今天的工作</div>

  <div class="cards">
    <a class="card card-kids" href="pod-kids.html">
      <div class="card-emoji">👧</div>
      <div class="tag tag-kids">Mom Culture</div>
      <div class="card-title">童装开发工具</div>
      <div class="card-sub">
        妈妈文化主干线<br>
        Milestone · Identity · Daily Bonding<br>
        四大视觉风格 · 全年情绪日历
      </div>
      <span class="card-btn">进入童装工具 →</span>
    </a>

    <a class="card card-home" href="pod-home.html">
      <div class="card-emoji">🏠</div>
      <div class="tag tag-home">Home Stories</div>
      <div class="card-title">家居开发工具</div>
      <div class="card-sub">
        家居故事主干线<br>
        Home Identity · Seasonal · Nature<br>
        2026流行风格 · 空间场景驱动
      </div>
      <span class="card-btn">进入家居工具 →</span>
    </a>
  </div>

  <div class="footer">API · Worker · KV 共用 · 侵权数据同步</div>
</div>
</body>
</html>
