      // ── Compress image before upload ───────────────────────────
      function compressImage(base64, maxW, quality) {
        return new Promise(function(resolve) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            const scale = Math.min(1, maxW/img.width);
            canvas.width  = img.width * scale;
            canvas.height = img.height * scale;
            canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
            resolve(canvas.toDataURL('image/jpeg', quality||0.75));
          };
          img.src = base64;
        });
      }

      
      // ── Batch PDF upload → in-memory global queue ──────────────
      async function handleBatchPdfUpload(e) {
        const files = Array.from(e.target.files);
        if(!files.length) return;
        if(!window.PDF_MEM_QUEUE) window.PDF_MEM_QUEUE = [];

        // ── Duplicate detection ──────────────────────────────────
        // Check against: existing library entries + current queue
        var existingEntries = S.g('cp_images_index') || [];
        var existingNames = existingEntries.map(function(e) {
          return (e.notes||'').replace('PDF导入：','').toLowerCase().trim();
        });
        var queueNames = (window.PDF_MEM_QUEUE||[]).map(function(q) {
          return q.fileName.toLowerCase().trim();
        });
        var duplicates = [];
        var nonDuplicates = [];
        for(var di=0; di<files.length; di++) {
          var fname = files[di].name.toLowerCase().trim();
          var inLibrary = existingNames.some(function(n){ return n === fname; });
          var inQueue = queueNames.some(function(n){ return n === fname; });
          if(inLibrary || inQueue) {
            duplicates.push(files[di].name + (inLibrary?' (已在图库中)':' (已在队列中)'));
          } else {
            nonDuplicates.push(files[di]);
          }
        }
        if(duplicates.length > 0) {
          var dupMsg = '⚠️ 检测到重复文件：\n\n' + duplicates.join('\n') + '\n\n';
          if(nonDuplicates.length === 0) {
            alert(dupMsg + '所有文件均已上传过，已取消。');
            e.target.value = '';
            return;
          }
          var proceed = confirm(dupMsg + '其余 '+nonDuplicates.length+' 个文件未重复，是否继续上传未重复的文件？');
          if(!proceed) { e.target.value=''; return; }
        }
        var filesToProcess = nonDuplicates.length > 0 ? nonDuplicates : [];
        if(filesToProcess.length === 0) { e.target.value=''; return; }
        // ── End duplicate detection ──────────────────────────────

        const newItems = [];
        for(let fi=0;fi<filesToProcess.length;fi++){
          const file=filesToProcess[fi];
          try {
            // Read as ArrayBuffer (kept in memory, NOT localStorage)
            const arrayBuf=await new Promise(function(res,rej){
              const r=new FileReader();
              r.onload=function(ev){res(ev.target.result);};
              r.onerror=rej; r.readAsArrayBuffer(file);
            });
            // Read as base64 string for Claude API
            const b64Str=await new Promise(function(res,rej){
              const r=new FileReader();
              r.onload=function(ev){res(ev.target.result.split(',')[1]);};
              r.onerror=rej; r.readAsDataURL(file);
            });
            const item={id:String(Date.now())+'_'+fi, fileName:file.name, arrayBuf:arrayBuf, b64Str:b64Str, status:'pending'};
            window.PDF_MEM_QUEUE.push(item);
            newItems.push(item);
          } catch(err){ console.warn('Failed to read',file.name,err); }
        }
        // Update UI state from memory queue
        setPdfQueue(getPdfStatusList());
        e.target.value='';
        // Start background processing
        if(newItems.length > 0) processPdfQueue();
      }

      // ── PDF.js: render page to canvas at high DPI ──────────────
      async function renderPdfPageToCanvas(pdfPage, scale) {
        scale = scale || 2.0;
        const viewport = pdfPage.getViewport({scale: scale});
        const canvas = document.createElement('canvas');
        canvas.width  = viewport.width;
        canvas.height = viewport.height;
        await pdfPage.render({canvasContext: canvas.getContext('2d', {willReadFrequently:true}), viewport: viewport}).promise;
        return canvas;
      }

      // ── PDF.js: extract embedded image objects from a page ──────
      async function extractPageImages(pdfPage) {
        const ops = await pdfPage.getOperatorList();
        const OPS = pdfjsLib.OPS;
        const imgNames = [];
        for(let i=0;i<ops.fnArray.length;i++){
          if(ops.fnArray[i]===OPS.paintImageXObject||ops.fnArray[i]===OPS.paintImageXObjectRepeat){
            const name=ops.argsArray[i][0];
            if(name&&imgNames.indexOf(name)<0) imgNames.push(name);
          }
        }
        const objs=pdfPage.objs;
        const results=[];
        for(let ni=0;ni<imgNames.length;ni++){
          try {
            const imgData=await new Promise(function(resolve,reject){
              objs.get(imgNames[ni],function(obj){obj?resolve(obj):reject(new Error('not found'));});
            });
            if(!imgData||!imgData.data||imgData.width<80||imgData.height<80) continue;
            const cv=document.createElement('canvas');
            cv.width=imgData.width; cv.height=imgData.height;
            const ctx=cv.getContext('2d');
            const id=ctx.createImageData(imgData.width,imgData.height);
            if(imgData.data.length===imgData.width*imgData.height*4){
              id.data.set(imgData.data);
            } else if(imgData.data.length===imgData.width*imgData.height*3){
              for(let p=0,q=0;p<imgData.data.length;p+=3,q+=4){
                id.data[q]=imgData.data[p];id.data[q+1]=imgData.data[p+1];
                id.data[q+2]=imgData.data[p+2];id.data[q+3]=255;
              }
            } else { continue; }
            ctx.putImageData(id,0,0);

            imgs.forEach(function(img,idx){

            });
          }

          // Step 3: Claude extracts text metadata
          const resp=await fetch('https://api.anthropic.com/v1/messages',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,
              messages:[{role:'user',content:[
                {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
                {type:'text',text:'Copyright infringement notice. Output JSON only (no markdown): {"plaintiff":"brand/artist name","works":["work title"],"style_description":"Chinese art style description","style_keywords":["Chinese style tag1","tag2"],"banned_elements":["Chinese: brand name","work name","visual feature to avoid"],"risk_level":"urgent or high","case_no":"","filed_date":""}'}

          });
          const rdata=await resp.json();
          const raw=(rdata.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
          let parsed=null;
          try{const si=raw.indexOf('{'),ei=raw.lastIndexOf('}');if(si>=0&&ei>=0)parsed=JSON.parse(raw.slice(si,ei+1));}catch(ex){}
          if(!parsed){alert('AI提取失败：'+raw.slice(0,150));setPdfLoading(false);e.target.value='';return;}

          // Step 4: Use extracted images; fallback to page renders if none found
          const meaningful=allImgs.filter(function(img){return img.w>=100&&img.h>=100;});

          setExtracted({...parsed,images:finalImgs,notes:'',_pdfName:file.name,_pageCount:numPages,_imgFound:allImgs.length});

    function ReportLine({line, acColor}) {
      var html = (line||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
      if(line.startsWith('## ')) return <div style={{background:acColor+'12',borderLeft:'4px solid '+acColor,borderRadius:'0 8px 8px 0',padding:'8px 16px',margin:'20px 0 8px',fontWeight:800,fontSize:15,color:acColor}}>{line.slice(3)}</div>;
      if(line.startsWith('### ')) return <div style={{fontWeight:700,fontSize:14,color:'#374151',margin:'14px 0 6px',padding:'4px 0',borderBottom:'1px solid #e2e8f0'}}>{line.slice(4)}</div>;
      if(line.startsWith('#### ')) return <div style={{fontWeight:600,fontSize:13,color:acColor,margin:'10px 0 4px'}}>{line.slice(5)}</div>;
      if(line.match(/^[-*] /)) return <div style={{display:'flex',gap:6,padding:'2px 0'}}><span style={{color:acColor,flexShrink:0}}>•</span><span style={{fontSize:13,lineHeight:1.7,color:'#374151'}} dangerouslySetInnerHTML={{__html:html.slice(2)}} /></div>;
      if(line.match(/^\d+\. /)) return <div style={{display:'flex',gap:6,padding:'2px 0'}}><span style={{color:acColor,flexShrink:0,fontWeight:700}}>{line.match(/^\d+/)[0]}.</span><span style={{fontSize:13,lineHeight:1.7,color:'#374151'}} dangerouslySetInnerHTML={{__html:html.replace(/^\d+\. /,'')}} /></div>;
      if(line.trim()) return <p style={{fontSize:13,lineHeight:1.8,color:'#374151',margin:'3px 0'}} dangerouslySetInnerHTML={{__html:html}} />;
      return <div style={{height:6}} />;
    }

    function TableBlock({rows, acColor}) {
      if(!rows||rows.length<1) return null;
      var header = rows[0];
      var body = rows.filter(function(_,i){return i>=2;});
      return (
        <table style={{width:'100%',borderCollapse:'collapse',margin:'12px 0',fontSize:12}}>
          <thead>

    function ReportDisplay({text, acColor}) {
      if(!text) return null;
      var lines = text.split('\n');
      var blocks = [];
      var tableRows = [];
      var key = 0;

      function flush() {
        if(tableRows.length>0) {
          blocks.push(<TableBlock key={key++} rows={tableRows} acColor={acColor} />);
          tableRows = [];
        }
      }

      lines.forEach(function(line) {
        if(line.match(/^\|.+\|$/)) {
          var cells = line.split('|').map(function(s){return s.trim();}).filter(function(s){return s;});
          if(!cells.every(function(s){return /^[-:]+$/.test(s);})) tableRows.push(cells);
        } else {
          flush();
          blocks.push(<ReportLine key={key++} line={line} acColor={acColor} />);
        }
      });
      flush();
      return <div>{blocks}</div>;
    }

        // Convert markdown to basic HTML

          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
          .replace(/^## (.+)$/gm,'</p><h2>$1</h2><p>')
          .replace(/^### (.+)$/gm,'</p><h3>$1</h3><p>')
          .replace(/^#### (.+)$/gm,'</p><h4>$1</h4><p>')

          .replace(/^\| (.+) \|$/gm, function(line){

      const SK='fb_records';
      const [records,setRecords] = useState(function(){return S.g(SK)||[];});
      const [form,setForm] = useState({theme:'',style:'',colors:'',elements:'',sales:'',revenue:'',feedback:'good',notes:''});
      const [insight,setInsight] = useState(S.g('fb_insight')||'');
      const [loading,setLoading] = useState(false);
      function sf(k,v){setForm(function(p){return {...p,[k]:v};});}
      function save(){
        if(!form.theme){alert('请填写主题');return;}
        const rec={...form,id:Date.now(),at:new Date().toISOString()};
        const u=[...records,rec];setRecords(u);S.s(SK,u);
        setForm({theme:'',style:'',colors:'',elements:'',sales:'',revenue:'',feedback:'good',notes:''});
        alert('反馈已保存');
      }
      async function genInsight(){
        if(!records.length){alert('请先录入反馈数据');return;}
        setLoading(true);
        try{
          const good=records.filter(function(r){return r.feedback==='good';}).slice(-10);
          const bad=records.filter(function(r){return r.feedback==='bad';}).slice(-5);
          const parts=[
            '分析POD产品销售反馈，总结规律：',
            '有销量图案('+good.length+'条)：'+good.map(function(r){return '主题:'+r.theme+' 风格:'+r.style+' 配色:'+r.colors+' 元素:'+r.elements+' 销量:'+r.sales;}).join('；'),
            '无销量图案('+bad.length+'条)：'+bad.map(function(r){return '主题:'+r.theme+' 风格:'+r.style+' 配色:'+r.colors;}).join('；'),
            '分析：①主题规律 ②风格规律 ③配色规律 ④热卖元素 ⑤下次建议 ⑥避坑建议'
          ];
          const r=await callClaudeAPI(parts.join(' '),'你是POD销售数据分析专家');
          setInsight(r);S.s('fb_insight',r);
        }catch(err){alert('分析失败：'+err.message);}
        setLoading(false);
      }
      const stats={sales:records.reduce(function(s,r){return s+(parseInt(r.sales)||0);},0),rev:records.reduce(function(s,r){return s+(parseFloat(r.revenue)||0);},0),good:records.filter(function(r){return r.feedback==='good';}).length};
      return <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <div style={{borderRadius:12,padding:'14px 20px',background:colors.grad,color:'white'}}>
          <div style={{fontWeight:800,fontSize:17}}>💡 销售反馈 & AI学习</div>
          <div style={{fontSize:12,opacity:0.85,marginTop:2}}>录入反馈 → AI分析规律 → 优化开发方向</div>
        </div>
        {records.length>0&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {[['总销量',stats.sales+'件','📦'],['总收入','$'+stats.rev.toFixed(0),'💰'],['好评率',records.length?Math.round(stats.good/records.length*100)+'%':'0%','⭐']].map(function(x){
            return <div key={x[0]} className="card" style={{textAlign:'center',padding:'14px 8px'}}>
              <div style={{fontSize:22}}>{x[2]}</div>
              <div style={{fontSize:24,fontWeight:800,color:colors.ac}}>{x[1]}</div>
              <div style={{fontSize:12,color:'#64748b'}}>{x[0]}</div>
            </div>;
          })}
        </div>}
        <div className="card">
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>➕ 录入反馈</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            {[['主题 *','theme','Easter, Dinosaur...'],['图案风格','style','kawaii, watercolor...'],['配色','colors','pastel pink, mint...'],['元素(逗号分隔)','elements','bunny, egg, flower...']].map(function(x){
              return <div key={x[1]}><div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{x[0]}</div><input type="text" value={form[x[1]]} placeholder={x[2]} onChange={function(e){sf(x[1],e.target.value);}} /></div>;
            })}
            {[['销量(件)','sales'],['收入($)','revenue']].map(function(x){
              return <div key={x[1]}><div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{x[0]}</div><input type="number" value={form[x[1]]} placeholder="0" onChange={function(e){sf(x[1],e.target.value);}} /></div>;
            })}
            <div><div style={{fontSize:12,fontWeight:600,marginBottom:4}}>评价</div>
              <select value={form.feedback} onChange={function(e){sf('feedback',e.target.value);}}>
                <option value="good">✅ 有销量(好)</option><option value="ok">😐 一般</option><option value="bad">❌ 无销量(差)</option>
              </select></div>
          </div>
          <div style={{marginBottom:10}}><div style={{fontSize:12,fontWeight:600,marginBottom:4}}>备注</div><textarea value={form.notes} onChange={function(e){sf('notes',e.target.value);}} rows={2} placeholder="为什么好卖/不好卖..."></textarea></div>
          <button className="btn" onClick={save} style={{background:colors.ac,color:'white',width:'100%',padding:'12px'}}>💾 保存反馈(AI将学习)</button>
        </div>
        <div className="card" style={{border:'2px solid '+colors.ac+'40'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:15}}>🤖 AI学习报告</div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn" onClick={genInsight} disabled={loading||!records.length} style={{background:colors.ac,color:'white',fontSize:12,padding:'6px 14px',opacity:(loading||!records.length)?0.5:1}}>{loading?'🔄 分析中...':'🧠 生成学习报告'}</button>
              {insight&&<CopyBtn text={insight} />}
            </div>
          </div>
          {loading&&<Spinner />}
          {insight&&!loading&&<div style={{background:'#f8fafc',borderRadius:8,padding:14,fontSize:13,lineHeight:1.8,whiteSpace:'pre-wrap'}}>{insight}</div>}
          {!insight&&!loading&&<div style={{textAlign:'center',padding:30,color:'#94a3b8',fontSize:13}}>录入5条以上反馈后，AI分析客户喜好规律</div>}
        </div>
        {records.length>0&&<div className="card">
          <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>📊 历史反馈({records.length}条)</div>
          {records.slice(-8).reverse().map(function(r,i){
            return <div key={i} style={{padding:'10px 12px',borderRadius:8,marginBottom:8,border:'1px solid #e2e8f0',background:r.feedback==='good'?'#f0fdf4':r.feedback==='bad'?'#fef2f2':'#f8fafc'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:600,fontSize:13}}>{r.theme}</span>
                <span style={{fontSize:16}}>{r.feedback==='good'?'✅':r.feedback==='bad'?'❌':'😐'}</span>
              </div>
              <div style={{fontSize:11,color:'#64748b',marginTop:2}}>风格:{r.style||'-'} · 销量:{r.sales||0} · ${r.revenue||0}</div>
              {r.notes&&<div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{r.notes}</div>}
            </div>;
          })}
        </div>}
      </div>;
    }

    // ── 渲染 ────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
